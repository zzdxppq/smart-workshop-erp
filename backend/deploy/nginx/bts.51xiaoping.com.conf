# ERP 佰泰胜 · bts.51xiaoping.com
# 前端：Vue/Vite 静态站（root 下 index.html + assets/）
# API：全部反代到 erp-gateway:9080（不直连微服务 9081/9082/9083）
# Gateway 再按路径 /erp-{service}/... 经 Nacos lb:// 转发到对应服务

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name bts.51xiaoping.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bts.51xiaoping.com;

    root /usr/share/nginx/www/cnc;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    client_max_body_size 1000M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # SSE（仍走 Gateway 9080，由 Gateway 转发 erp-business）
    location /erp-business/sse/ {
        proxy_pass http://10.100.6.14:9080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 所有 API 统一反代 Gateway（路径含 erp-platform/business/production 仅作 Gateway 路由键）
    location ~ ^/erp-(platform|business|production)/ {
        proxy_pass http://10.100.6.14:9080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        client_max_body_size 1000M;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 16k;
    }

    # Vite 构建资源（带 hash · 长期缓存）
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ^~ /logo- {
        root /usr/share/nginx/www/cnc;
        access_log off;
    }

    # HTML 不缓存
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # 其它静态资源
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Vue SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/bts.51xiaoping.com.access.log;
    error_log  /var/log/nginx/bts.51xiaoping.com.error.log warn;
}
