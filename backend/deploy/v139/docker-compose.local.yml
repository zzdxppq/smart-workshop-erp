# docker-compose.local.yml - 昆山佰泰胜专属 ERP V1.3.9 本地服务器部署（单台 Ubuntu 24.04 · 纯 HTTP）
#
# 与云部署区别：
#   - 无 SSL（客户机内网 · 纯 HTTP 80 端口）
#   - 端口直接对外 0.0.0.0（不像云部署绑 127.0.0.1 + nginx 转发）
#   - SkyWalking 存储简化用 H2（ES 部署复杂）
#   - 资源更紧凑（单机 8C16G）
#
# 启动顺序：mysql-master (health) → redis (health) → nacos (health)
#   → skywalking-oap (health) → prometheus (health) → grafana (health)
#   → erp-platform (health) → erp-business (health) → erp-gateway (health) → nginx (health)
#
# 用法：
#   cp .env.local.example .env.local   # 编辑密码
#   docker compose -f docker-compose.local.yml --env-file .env.local up -d
#   docker compose -f docker-compose.local.yml logs -f

version: "3.9"

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

networks:
  erp-net:
    driver: bridge

volumes:
  mysql-master-data:
  redis-data:
  nacos-data:
  skywalking-data:
  prometheus-data:
  grafana-data:
  nginx-logs:

services:
  # ==================== 核心中间件 ====================
  mysql-master:
    image: mysql:8.0
    container_name: erp-mysql-master
    <<: *restart_policy
    <<: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"   # 本地服务器直对外（内网可信）
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./db/seed:/docker-entrypoint-initdb.d/seed:ro
      - mysql-master-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=512
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2.0G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks: [erp-net]

  # mysql-slave 暂时注释（避免无配置的主从误导 · 需要时取消注释 + 配 server-id + binlog）
  # mysql-slave:
  #   image: mysql:8.0
  #   container_name: erp-mysql-slave
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
  #     MYSQL_USER: ${MYSQL_USER}
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD}
  #   volumes:
  #     - mysql-slave-data:/var/lib/mysql
  #   networks: [erp-net]

  redis:
    image: redis:7.2
    container_name: erp-redis
    <<: *restart_policy
    <<: *default-logging
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks: [erp-net]

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: erp-nacos
    <<: *restart_policy
    <<: *default-logging
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      SPRING_DATASOURCE_PLATFORM: mysql
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      MYSQL_SERVICE_HOST: mysql-master
      MYSQL_SERVICE_DB_NAME: ${NACOS_DB_NAME}
      MYSQL_SERVICE_USER: ${MYSQL_USER}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    depends_on:
      mysql-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    networks: [erp-net]

  # ==================== APM（本地版用 H2 存储） ====================
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: erp-skywalking-oap
    <<: *restart_policy
    <<: *default-logging
    environment:
      SW_STORAGE: h2              # 本地版简化用 H2 内嵌存储 · 云部署改 ES
      SW_HEALTH_CHECKER: default
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    ports:
      - "11800:11800"   # agent gRPC（仅内网）
      - "12800:12800"   # REST（仅内网）
    volumes:
      - skywalking-data:/skywalking/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:12800/health/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1.0G
        reservations:
          cpus: "0.3"
          memory: 512M
    networks: [erp-net]

  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: erp-skywalking-ui
    <<: *restart_policy
    <<: *default-logging
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "8088:8080"
    depends_on:
      skywalking-oap:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks: [erp-net]

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: erp-prometheus
    <<: *restart_policy
    <<: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks: [erp-net]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: erp-grafana
    <<: *restart_policy
    <<: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks: [erp-net]

  # ==================== ERP 业务服务 ====================
  erp-platform:
    build:
      context: ../
      dockerfile: src/erp-platform/Dockerfile
    image: erp/platform:1.3.9
    container_name: erp-platform
    <<: *restart_policy
    <<: *default-logging
    environment:
      SPRING_PROFILES_ACTIVE: local
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql-master
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JAVA_OPTS: "-Xms768m -Xmx1536m -javaagent:/opt/skywalking/agent/skywalking-agent.jar -Dskywalking.agent.service_name=erp-platform -Dskywalking.collector.backend_service=skywalking-oap:11800"
    volumes:
      - ./skywalking/agent:/opt/skywalking/agent:ro
    depends_on:
      nacos:
        condition: service_healthy
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks: [erp-net]

  erp-business:
    build:
      context: ../
      dockerfile: src/erp-business/Dockerfile
    image: erp/business:1.3.9
    container_name: erp-business
    <<: *restart_policy
    <<: *default-logging
    environment:
      SPRING_PROFILES_ACTIVE: local
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql-master
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JAVA_OPTS: "-Xms768m -Xmx1536m -javaagent:/opt/skywalking/agent/skywalking-agent.jar -Dskywalking.agent.service_name=erp-business -Dskywalking.collector.backend_service=skywalking-oap:11800"
    volumes:
      - ./skywalking/agent:/opt/skywalking/agent:ro
    depends_on:
      erp-platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks: [erp-net]

  erp-gateway:
    build:
      context: ../
      dockerfile: src/erp-gateway/Dockerfile
    image: erp/gateway:1.3.9
    container_name: erp-gateway
    <<: *restart_policy
    <<: *default-logging
    environment:
      SPRING_PROFILES_ACTIVE: local
      NACOS_SERVER: nacos:8848
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JAVA_OPTS: "-Xms256m -Xmx512m -javaagent:/opt/skywalking/agent/skywalking-agent.jar -Dskywalking.agent.service_name=erp-gateway -Dskywalking.collector.backend_service=skywalking-oap:11800"
    volumes:
      - ./skywalking/agent:/opt/skywalking/agent:ro
    depends_on:
      erp-platform:
        condition: service_healthy
      erp-business:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    networks: [erp-net]

  # ==================== Nginx 反向代理（纯 HTTP · 无 SSL） ====================
  nginx:
    image: nginx:1.27-alpine
    container_name: erp-nginx
    <<: *restart_policy
    <<: *default-logging
    ports:
      - "80:80"   # 本地版纯 HTTP（客户机内网）
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      erp-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks: [erp-net]
