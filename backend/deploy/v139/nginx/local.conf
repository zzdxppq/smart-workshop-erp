# nginx/local.conf - 昆山佰泰胜 ERP V1.3.9 本地部署反向代理（纯 HTTP）
# 配套 docker-compose.local.yml · 客户机内网可信 · 无 SSL

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 上传大小（图纸 PDF / 大文件）
    client_max_body_size 200M;
    client_body_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # 访问日志
    log_format erp '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/erp_access.log erp;
    error_log  /var/log/nginx/erp_error.log warn;

    # 后端 ERP Gateway
    location / {
        proxy_pass http://erp-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # 监控面板路径（客户机内网）
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
    }

    location /prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
    }

    location /skywalking/ {
        proxy_pass http://skywalking-ui:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /skywalking;
    }

    location /nacos/ {
        proxy_pass http://nacos:8848/nacos/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /nacos;
    }
}
