# nginx/cloud.conf - 昆山佰泰胜 ERP V1.3.9 云部署反向代理 + SSL 终止
# 配套 docker-compose.cloud.yml · 证书放 ./ssl/ 目录

# 强制 HTTPS（HTTP → HTTPS 301）
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt acme.sh 验证用（保留）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    # SSL 证书（acme.sh 签发后放 ./ssl/）
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 安全配置（TLS 1.2+ · 强加密套件）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 上传大小（图纸 PDF / 大文件）
    client_max_body_size 200M;
    client_body_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # 访问日志（含 traceId 供 SkyWalking 关联）
    log_format erp '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/erp_access.log erp;
    error_log  /var/log/nginx/erp_error.log warn;

    # 后端 ERP Gateway
    location / {
        proxy_pass http://erp-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # 监控面板路径（限内网访问）
    location /grafana/ {
        # 云部署建议加白名单：allow 10.0.0.0/8; deny all;
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
    }

    location /prometheus/ {
        # 同上白名单
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
    }

    location /skywalking/ {
        proxy_pass http://skywalking-ui:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /skywalking;
    }

    location /nacos/ {
        # Nacos 控制台（仅内网 + 限白名单）
        proxy_pass http://nacos:8848/nacos/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /nacos;
    }
}
