# docker-compose.cloud.yml - 昆山佰泰胜专属 ERP V1.3.9 云部署（单台 Ubuntu 24.04 + SSL）
#
# 启动顺序：mysql-master (health) → redis (health) → nacos (health)
#   → skywalking-oap (health) → prometheus (health) → grafana (health)
#   → erp-platform (health) → erp-business (health) → erp-gateway (health) → nginx (health)
#
# 用法：
#   cp .env.cloud.example .env.cloud   # 编辑密码
#   docker compose -f docker-compose.cloud.yml --env-file .env.cloud up -d
#   docker compose -f docker-compose.cloud.yml logs -f
#
# 资源限制（防止单服务拖垮单台服务器 · 8 核 16G 估算）：
#   - MySQL      2.0 CPU / 2.0G  · 数据库瓶颈
#   - Redis      0.5 CPU / 512M  · 缓存
#   - Nacos      0.5 CPU / 512M  · 服务发现
#   - SkyWalking 1.0 CPU / 1.0G  · APM
#   - Prometheus 0.5 CPU / 512M  · 指标
#   - Grafana    0.5 CPU / 512M  · 可视化
#   - erp-platform 1.5 CPU / 1.5G · 平台服务
#   - erp-business 1.5 CPU / 1.5G · 业务服务
#   - erp-gateway 0.5 CPU / 512M · 网关
#   - Nginx      0.3 CPU / 256M  · 反向代理 + SSL 终止
#   合计：8.8 CPU / 9.3G RAM · 与 8C16G 服务器匹配（保留 6.7G 给 OS + buffer）

version: "3.9"

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

networks:
  erp-net:
    driver: bridge

volumes:
  mysql-master-data:
  redis-data:
  nacos-data:
  skywalking-data:
  skywalking-logs:
  prometheus-data:
  grafana-data:
  nginx-ssl:
  nginx-logs:

services:
  # ==================== 核心中间件 ====================
  mysql-master:
    image: mysql:8.0
    container_name: erp-mysql-master
    <<: *restart_policy
    <<: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"   # 云服务器 bind localhost + nginx 转发 · 避免直暴露
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./db/seed:/docker-entrypoint-initdb.d/seed:ro
      - mysql-master-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=512
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks: [erp-net]

  # mysql-slave 暂时注释（避免无配置的主从误导 · 需要时取消注释 + 配 server-id + binlog）
  # mysql-slave:
  #   image: mysql:8.0
  #   container_name: erp-mysql-slave
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
  #     MYSQL_USER: ${MYSQL_USER}
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD}
  #   volumes:
  #     - mysql-slave-data:/var/lib/mysql
  #   networks: [erp-net]

  redis:
    image: redis:7.2
    container_name: erp-redis
    <<: *restart_policy
    <<: *default-logging
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks: [erp-net]

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: erp-nacos
    <<: *restart_policy
    <<: *default-logging
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      SPRING_DATASOURCE_PLATFORM: mysql
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      MYSQL_SERVICE_HOST: mysql-master
      MYSQL_SERVICE_DB_NAME: ${NACOS_DB_NAME}
      MYSQL_SERVICE_USER: ${MYSQL_USER}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:8848:8848"
      - "127.0.0.1:9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    depends_on:
      mysql-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    networks: [erp-net]

  # ==================== APM 可观测性（监控数据持久化） ====================
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: erp-skywalking-oap
    <<: *restart_policy
    <<: *default-logging
    environment:
      SW_STORAGE: elasticsearch   # 默认 h2 · 云部署改 ES
      SW_HEALTH_CHECKER: default
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    ports:
      - "127.0.0.1:11800:11800"   # agent gRPC
      - "127.0.0.1:12800:12800"   # REST
    volumes:
      - skywalking-data:/skywalking/data
      - skywalking-logs:/skywalking/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:12800/health/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1.0G
        reservations:
          cpus: "0.3"
          memory: 512M
    networks: [erp-net]

  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: erp-skywalking-ui
    <<: *restart_policy
    <<: *default-logging
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "127.0.0.1:8088:8080"
    depends_on:
      skywalking-oap:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks: [erp-net]

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: erp-prometheus
    <<: *restart_policy
    <<: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks: [erp-net]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: erp-grafana
    <<: *restart_policy
    <<: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks: [erp-net]

  # ==================== ERP 业务服务 ====================
  erp-platform:
    build:
      context: ../
      dockerfile: src/erp-platform/Dockerfile
    image: erp/platform:1.3.9
    container_name: erp-platform
    <<: *restart_policy
    <<: *default-logging
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql-master
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JAVA_OPTS: "-Xms768m -Xmx1536m -javaagent:/opt/skywalking/agent/skywalking-agent.jar -Dskywalking.agent.service_name=erp-platform -Dskywalking.collector.backend_service=skywalking-oap:11800"
    volumes:
      - ./skywalking/agent:/opt/skywalking/agent:ro
    depends_on:
      nacos:
        condition: service_healthy
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks: [erp-net]

  erp-business:
    build:
      context: ../
      dockerfile: src/erp-business/Dockerfile
    image: erp/business:1.3.9
    container_name: erp-business
    <<: *restart_policy
    <<: *default-logging
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql-master
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JAVA_OPTS: "-Xms768m -Xmx1536m -javaagent:/opt/skywalking/agent/skywalking-agent.jar -Dskywalking.agent.service_name=erp-business -Dskywalking.collector.backend_service=skywalking-oap:11800"
    volumes:
      - ./skywalking/agent:/opt/skywalking/agent:ro
    depends_on:
      erp-platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks: [erp-net]

  erp-gateway:
    build:
      context: ../
      dockerfile: src/erp-gateway/Dockerfile
    image: erp/gateway:1.3.9
    container_name: erp-gateway
    <<: *restart_policy
    <<: *default-logging
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      NACOS_SERVER: nacos:8848
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JAVA_OPTS: "-Xms256m -Xmx512m -javaagent:/opt/skywalking/agent/skywalking-agent.jar -Dskywalking.agent.service_name=erp-gateway -Dskywalking.collector.backend_service=skywalking-oap:11800"
    volumes:
      - ./skywalking/agent:/opt/skywalking/agent:ro
    depends_on:
      erp-platform:
        condition: service_healthy
      erp-business:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    networks: [erp-net]

  # ==================== Nginx 反向代理 + SSL 终止 ====================
  nginx:
    image: nginx:1.27-alpine
    container_name: erp-nginx
    <<: *restart_policy
    <<: *default-logging
    ports:
      - "80:80"      # HTTP（重定向到 HTTPS）
      - "443:443"    # HTTPS
    volumes:
      - ./nginx/cloud.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # SSL 证书（acme.sh 签发或自签）
      - nginx-ssl:/etc/nginx/ssl                # SSL volume 持久化
      - nginx-logs:/var/log/nginx
    depends_on:
      erp-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks: [erp-net]
