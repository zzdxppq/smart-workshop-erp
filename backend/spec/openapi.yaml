  # ============================================================
  # V1.3.9 Sprint 12 · Story 12.1 图纸权限矩阵（3 端点）
  # ============================================================

  /drawings/{id}/permission:
    get:
      tags: [E3-Drawing-ACL]
      summary: 查询当前用户对图纸的权限位（任意角色可调 · FINANCE 也返 200 + 全 false）
      operationId: getDrawingPermission
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
          description: crm_drawing.id
      responses:
        '200':
          description: 权限位返回（任意角色 · 包括 FINANCE scope=NONE）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DrawingPermissionDTO'
        '404':
          description: 图纸不存在
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      code: { example: 40401 }

  /drawings/{id}/preview:
    get:
      tags: [E3-Drawing-ACL]
      summary: 图纸预览（带 ACL · 自动审计 · @PreAuthorize @drawingAuthz.canView）
      operationId: previewDrawing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
          description: crm_drawing.id
        - name: resolution
          in: query
          schema: { type: string, enum: [LOW, MEDIUM, HIGH], default: MEDIUM }
      responses:
        '200':
          description: PDF 流（带水印 · 防止截屏外发）
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '403':
          description: ACL 拒绝（错误码统一 40304）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      code: { example: 40304 }
                      message:
                        example: "该图纸未关联您的订单"
                        description: |
                          错误消息（角色定制）：
                          - FINANCE → "FINANCE 角色无图纸权限"
                          - SALES 不关联订单 → "该图纸未关联您的订单"
                          - PURCHASER/WAREHOUSE/QC 类似
                          - OPERATOR 工序不关联 → "当前工序未关联该图纸"
        '404':
          description: 图纸不存在
        '410':
          description: 图纸已归档（OBSOLETE/ARCHIVED · 默认不可预览）

  /drawings/{id}/download:
    get:
      tags: [E3-Drawing-ACL]
      summary: 下载图纸原文件（仅 ENGINEER · @PreAuthorize @drawingAuthz.canDownload）
      operationId: downloadDrawing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
          description: crm_drawing.id
      responses:
        '200':
          description: 原文件流（PDF/签字扫描件 ZIP · application/octet-stream）
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: 非 ENGINEER 角色拒绝（40304）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      code: { example: 40304 }
                      message: { example: "该图纸仅 ENGINEER 可下载" }
        '404':
          description: 图纸不存在

  # ============================================================
  # V1.3.9 Sprint 13 Story 13.3 · 真实查询对接 3 端点
  # ============================================================

  /drawings/{id}/links:
    get:
      tags: [E3-Drawing-Link-Query]
      summary: 图纸 → 关联业务单据 ID 列表（13.3 端点 1 · 按 biz_type 过滤 · 无缓存）
      operationId: getDrawingLinks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
          description: crm_drawing.id
        - name: biz_type
          in: query
          required: true
          schema:
            type: string
            enum: [ORDER, PO, INCOMING, INSPECTION, WORKORDER_PROCESS]
          description: 业务类型（5 类枚举）
      responses:
        '200':
          description: 关联业务单据列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/DrawingLinkListResponse' }
        '400':
          description: INVALID_BIZ_TYPE（40001）
        '403':
          description: DRAWING_FORBIDDEN（40304 · 角色与 biz_type 不匹配）
        '404':
          description: DRAWING_NOT_FOUND（40401）

  /drawings/accessible:
    get:
      tags: [E3-Drawing-Link-Query]
      summary: 业务单据 → 可访问图纸列表（13.3 端点 2 · Redis 5min 缓存）
      operationId: getAccessibleDrawings
      security:
        - bearerAuth: []
      parameters:
        - name: biz_type
          in: query
          required: true
          schema:
            type: string
            enum: [ORDER, PO, INCOMING, INSPECTION, WORKORDER_PROCESS]
          description: 业务类型（5 类枚举）
        - name: biz_id
          in: query
          required: true
          schema: { type: integer, format: int64 }
          description: 业务单据 ID
      responses:
        '200':
          description: 可访问图纸列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AccessibleDrawingListResponse' }
        '400':
          description: INVALID_BIZ_TYPE（40001）
        '403':
          description: DRAWING_FORBIDDEN（40304）
        '404':
          description: BIZ_DOC_NOT_FOUND（40401）

  /drawings/process/{processId}:
    get:
      tags: [E3-Drawing-Link-Query]
      summary: OPERATOR 工序 → 可访问图纸列表（13.3 端点 3 · Redis 5min 缓存 · 手机端扫码）
      operationId: getOperatorProcessDrawings
      security:
        - bearerAuth: []
      parameters:
        - name: processId
          in: path
          required: true
          schema: { type: integer, format: int64 }
          description: 工序 ID（crm_workorder_process.id）
      responses:
        '200':
          description: 工序可访问图纸列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OperatorProcessDrawingResponse' }
        '403':
          description: PROCESS_FORBIDDEN（40304 · 工序非本人操作）
        '404':
          description: PROCESS_NOT_FOUND（40402 · 工序不存在或非 IN_PROGRESS）

