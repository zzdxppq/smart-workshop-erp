      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkflowCreateRequest' }
      responses:
        '200': { description: 成功 }
        '40001': { description: 节点阈值不单调 }
        '40005': { description: 节点数 2-20 之外 }
        '40905': { description: workflow_code 重复 }
    get:
      tags: [E1-Workflow]
      summary: 工作流列表（分页）
      operationId: listWorkflows
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema: { type: string, enum: [ACTIVE, INACTIVE, DELETED] }
        - name: keyword
          in: query
          schema: { type: string }
      responses:
        '200': { description: 成功 }
    put:
      tags: [E1-Workflow]
      summary: 修改工作流（V1.3.7 · 物理替换节点链）
      operationId: updateWorkflow
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkflowUpdateRequest' }
      responses:
        '200': { description: 成功 }
        '40001': { description: 节点阈值不单调 }
        '40906': { description: 工作流正在被使用 }
    delete:
      tags: [E1-Workflow]
      summary: 删除工作流（内置模板 40904）
      operationId: deleteWorkflow
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40904': { description: 内置工作流不可删除 }

  /workflows/{id}:
    get:
      tags: [E1-Workflow]
      summary: 工作流详情（含 nodes 列表）
      operationId: getWorkflow
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40401': { description: 工作流不存在 }

  /workflows/{id}/test:
    post:
      tags: [E1-Workflow]
