openapi: 3.0.3
info:
  title: 昆山佰泰胜专属 ERP 系统 API
  description: |
    V1.3.7 完整契约 · 13 Epic / 220+ 端点

    **升级要点**（vs V1.3.1）：
    - 工序分配职责严格分离生管 vs 采购（AD-1）
    - 月度对账不含"线下"动作（AD-2）
    - 单一 163 邮箱通知渠道（AD-3）
    - 委外 7 状态机 + 返修闭环 + 历史交期预估（V1.3.4）
    - 料号 5 段成本聚合（V1.3.4）
    - 签字扫描件 AES-256-GCM 加密（V1.3.6）

    **配套文档**：
    - `docs/prd.md` V1.3.7
    - `docs/architect-handoff.md` V1.1
    - `docs/ux-handoff.md` V1.1
    - `backend/spec/openapi.yaml`（本文件）
  version: 1.3.7
  contact:
    name: 河南晓评信息科技有限公司
    email: panqiang@yourcompany.com
  license:
    name: Proprietary

servers:
  - url: https://erp.yourcompany.local
    description: 生产环境（甲方内网）
  - url: http://localhost:8080
    description: 本地开发（通过 erp-gateway 8080）

tags:
  - name: E1-Auth
    description: 认证 / 用户 / 角色（E1-S1）
  - name: E1-Workflow
    description: 审批工作流（E1-S2）
  - name: E1-Dict
    description: 字典 / 系统参数（E1-S3）
  - name: E1-App
    description: APP 同步 / 消息（E1-S4）
  - name: E1-Email
    description: 邮件配置 / 163 邮箱（V1.3.7 新增）
  - name: E2-CRM
    description: 客户档案（E2-S1）
  - name: E2-Sales
    description: 报价 / 订单 / 合同回款（E2-S2/S3/S4）
  - name: E3-Drawing
    description: 图纸 / BOM / 工艺（E3-S1/S2/S3/S4）
  - name: E4-Warehouse
    description: 扫码仓储（E4-S1/S2/S3/S4）
  - name: E5-Workorder
    description: 工单 / 排产 / MRP（E5-S1）
  - name: E5-Scan
    description: 扫码三码（E5-S2）
  - name: E5-Allocation
    description: 工序分配职责（E5-S4 · V1.3.7 新增）
  - name: E5-Machine
    description: 设备 / 机台（E5-S5）
  - name: E6-Outsub
    description: 委外 7 状态机 + 返修 + 交期预估（E6 全集 · V1.3.4-V1.3.7）
  - name: E6-Outsource-State-Machine
    description: 委外 7 状态机深化（E6-S2 · V1.3.7 Story 1.22 FR-6-2）
  - name: E6-Rework
    description: 委外返修闭环（E6-S3 · V1.3.7 Story 1.23 FR-6-3）
  - name: E6-Reconcile
    description: 月度对账不含"线下"（E6-S1 · V1.3.6-V1.3.7）
  - name: E7-Quality
    description: 品质管控（E7-S1/S2/S3/S4）
  - name: E8-Purchase
    description: 采购（E8-S1/S2/S3/S4）
  - name: E9-Finance
    description: 应收应付 / 成本 / 付款 / 利润（E9-S1/S2/S3/S4）
  - name: E9-CostAgg
    description: 料号 5 段成本聚合（E9-S5 + E11-S5 · V1.3.4 新增）
  - name: E10-HR
    description: 人事（E10-S1/S2/S3）
  - name: E11-Dashboard
    description: 报表看板（E11-S1/S2/S3 + S4/S5）
  - name: E12-Receive
    description: 仓管到货扫码（E12-S2 · V1.3.5）
  - name: Platform
    description: 基础能力（用户/角色/文件/MinIO）

# ============================================================
# 安全
# ============================================================
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT (HS256) · access 2h + refresh 7d
        Header: `Authorization: Bearer <token>`

  # ---------- Schemas ----------
  schemas:
    # 通用
    Result:
      type: object
      properties:
        code: { type: integer, example: 0 }
        message: { type: string, example: ok }
        data: {}
        traceId: { type: string, example: abc123 }
    PageResponse:
      type: object
      properties:
        records: { type: array, items: {} }
        total: { type: integer, example: 100 }
        pageNum: { type: integer, example: 1 }
        pageSize: { type: integer, example: 20 }
        pages: { type: integer, example: 5 }

    # 错误码枚举
    ErrorCode:
      type: string
      enum:
        - 0          # 成功
        - 40001      # 参数缺失
        - 40002      # 参数格式
        - 40003      # 参数越界
        - 40101      # 未登录
        - 40102      # Token 过期
        - 40103      # 黑名单
        - 40301      # 无权限
        - 40302      # 数据范围越界
        - 40303      # 金额超限
        - 40304      # 工序分配越权（V1.3.7）
        - 40401      # 单据不存在
        - 40402      # 文件已删除
        - 40901      # 状态机不匹配
        - 40902      # 库存不足
        - 40903      # 保护期内
        - 40904      # 状态机不匹配（V1.3.4）
        - 40905      # 对账金额不一致（V1.3.6）
        - 42901      # QPS 超限
        - 42902      # 并发用户超限
        - 50001      # 系统异常
        - 50002      # 数据库异常
        - 50003      # Redis 异常
        - 50201      # MinIO 不可用
        - 50202      # XXL-JOB 调用失败
        - 50203      # 163 SMTP 失败（V1.3.7）
        - 50204      # 邮件额度耗尽（V1.3.7）
        - 90001      # 企业微信调用失败

    # ---------- 业务对象 ----------
    User:
      type: object
      properties:
        id: { type: integer, example: 1001 }
        username: { type: string, example: huangziyun }
        realName: { type: string, example: 黄梓昀 }
        phone: { type: string, example: '15105950281' }
        email: { type: string, example: huangziyun@baotai.com }
        deptId: { type: integer, example: 1 }
        status: { type: string, enum: [ACTIVE, DISABLED] }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, minLength: 8, maxLength: 32 }
    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: '#/components/schemas/User' }

    Customer:
      type: object
      properties:
        id: { type: integer }
        customerCode: { type: string, example: KH202606090001 }
        name: { type: string, example: 苏州A精机有限公司 }
        industry: { type: string, example: 汽车零部件 }
        creditLimit: { type: number, example: 500000.00 }
        ownerId: { type: integer, example: 1002 }
        protectUntil: { type: string, format: date }
        status: { type: string, enum: [ACTIVE, LOST, PROTECTED] }

    Quote:
      type: object
      properties:
        id: { type: integer }
        quoteNo: { type: string, example: BJ202606110001 }
        customerId: { type: integer }
        customerName: { type: string }
        ownerUserId: { type: integer }
        deptId: { type: integer }
        currency: { type: string, example: CNY }
        deliveryDate: { type: string, format: date }
        totalAmount: { type: number, example: 85000.00, description: '由 items 自动计算（只读）' }
        isFa: { type: boolean }
        isNew: { type: boolean }
        status: { type: string, enum: [DRAFT, SUBMITTED, APPROVED, REJECTED, CONVERTED] }
        currentNode: { type: integer, description: '当前审批节点 1/2/3' }
        comment: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    QuoteItem:
      type: object
      properties:
        id: { type: integer }
        quoteId: { type: integer }
        drawingNo: { type: string, example: DWG-001 }
        material: { type: string, example: STEEL }
        spec: { type: string }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: number, minimum: 0 }
        amount: { type: number, description: '= quantity * unitPrice' }
        isFa: { type: boolean }
        isNew: { type: boolean }
        sort: { type: integer }

    QuoteCreateRequest:
      type: object
      required: [quote, items]
      properties:
        quote: { $ref: '#/components/schemas/Quote' }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/QuoteItem' }

    QuoteUpdateRequest:
      type: object
      properties:
        customerName: { type: string }
        deliveryDate: { type: string, format: date }
        isFa: { type: boolean }
        isNew: { type: boolean }
        comment: { type: string }

    QuoteSubmitRequest:
      type: object
      properties:
        candidates:
          type: array
          items: { type: integer }
          description: '可选：手工指定 OR 会签候选人'

    QuoteApproveRequest:
      type: object
      properties:
        adminPassword:
          type: string
          description: 'V1.3.7 红线 2：> 20万 二次密码确认（admin 密码）'
        approverUserId: { type: integer }

    QuoteRejectRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, description: '驳回原因，写入 crm_quote_history' }
        approverUserId: { type: integer }

    QuoteConvertRequest:
      type: object
      properties:
        quantityAdjustment:
          type: integer
          description: 'V1.3.7 P2 修补 3：报价 100 → 订单 80 数量调整'

    # ============================================================
    # E3-Order · Story 1.6 · 订单 Schemas
    # ============================================================
    Order:
      type: object
      description: 'V1.3.7 Story 1.6 订单主表（crm_order）'
      properties:
        id: { type: integer }
        orderNo: { type: string, example: 'XS20260612-0001', description: 'XS+YYYYMMDD+NNNN（继承 1.5 DocNoGenerator）' }
        quoteId: { type: integer, description: '来源报价ID(1.5 转单时非空)' }
        customerId: { type: integer }
        customerName: { type: string }
        ownerUserId: { type: integer }
        deptId: { type: integer }
        currency: { type: string, default: 'CNY' }
        totalAmount: { type: number, format: double, description: '由 items 自动计算（只读）' }
        deliveryDate: { type: string, format: date }
        isFa: { type: boolean }
        isNew: { type: boolean }
        isUrgent: { type: boolean, description: 'V1.3.7 加急' }
        status:
          type: string
          enum: [DRAFT, CONFIRMED, PRODUCING, PARTIAL_SHIPPED, SHIPPED, SETTLED, CLOSED, CANCELLED]
          description: 'V1.3.7 §附录-b 7 状态机'
        currentNode: { type: integer, description: '当前审批节点 1/2/3' }
        comment: { type: string }
        productionOrderNo: { type: string, example: 'GD20260612-0001', description: '转生产时生成（Epic 5）' }
        outsourceOrderNo: { type: string, example: 'WW20260612-0001', description: '转委外时生成（Epic 6）' }
        creditLimitCheck: { type: integer, description: '0=未通过, 1=通过, -1=无限制' }
        isDeleted: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    OrderItem:
      type: object
      description: '订单明细（crm_order_item，含 quantityAdjustment hook）'
      properties:
        id: { type: integer }
        orderId: { type: integer }
        drawingNo: { type: string, example: 'DWG-2026-001' }
        material: { type: string, example: '45#' }
        spec: { type: string, example: 'M10x20' }
        quantity: { type: integer }
        unitPrice: { type: number }
        amount: { type: number }
        quantityAdjustment: { type: integer, description: 'V1.3.7 数量调整（来自 1.5 hook）' }
        isFa: { type: boolean }
        isNew: { type: boolean }
        sort: { type: integer }
        producedQty: { type: integer, description: '已生产数量' }
        shippedQty: { type: integer, description: '已发货数量（累计）' }

    OrderCreateRequest:
      type: object
      description: '订单创建请求（继承 1.5 quantityAdjustment 字段）'
      required: [order, items]
      properties:
        order: { $ref: '#/components/schemas/Order' }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/OrderItem' }

    OrderUpdateRequest:
      type: object
      description: '订单更新请求（仅 DRAFT 状态可改）'
      properties:
        order: { $ref: '#/components/schemas/Order' }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }

    OrderConfirmRequest:
      type: object
      description: '订单确认请求（DRAFT → CONFIRMED，> 20万 必填二次密码）'
      properties:
        secondPassword: { type: string, description: '> 20万 二次密码确认' }
        comment: { type: string }

    OrderCancelRequest:
      type: object
      description: '订单取消请求（含 reason 必填）'
      required: [reason]
      properties:
        reason: { type: string, description: '取消原因（必填）' }

    OrderConvertRequest:
      type: object
      description: '1.5→1.6 转订单请求（继承 1.5 quantityAdjustment 字段）'
      properties:
        quantityAdjustment: { type: integer, description: 'V1.3.7 P2 修补 3：报价 100 → 订单 80 数量调整' }
        comment: { type: string }

    OrderProfit:
      type: object
      description: '订单利润分析（利润 = 订单金额 - 生产成本 - 委外成本 - 材料成本）'
      properties:
        orderId: { type: integer }
        orderNo: { type: string }
        orderAmount: { type: number }
        productionCost: { type: number }
        outsourceCost: { type: number }
        materialCost: { type: number }
        totalCost: { type: number }
        profit: { type: number }
        profitRate: { type: string, example: '25.00%' }
        isLoss: { type: boolean, description: '利润 < 0 触发告警' }
        alert: { type: string, example: 'NEGATIVE_PROFIT_WARNING' }

    Workorder:
      type: object
      properties:
        id: { type: integer }
        workorderNo: { type: string, example: GD202606090001 }
        orderId: { type: integer }
        productCode: { type: string, example: YL-45-D80 }
        qty: { type: integer, example: 50 }
        planStart: { type: string, format: date }
        planEnd: { type: string, format: date }
        status: { type: string, enum: [DRAFT, PENDING_SCHEDULE, SCHEDULED, IN_PROGRESS, REPORTED, INSPECTED, STORED, CLOSED, CANCELLED] }
        machineId: { type: integer }

    WorkorderProcess:
      type: object
      properties:
        id: { type: integer }
        workorderId: { type: integer }
        processSeq: { type: integer, example: 1 }
        processCode: { type: string, example: P01 }
        qty: { type: integer }
        isOutsource: { type: boolean, description: 'V1.3.7 新增' }
        assignedBy: { type: integer, description: 'V1.3.7 生管 ID' }
        assignedAt: { type: string, format: date-time }
        status: { type: string, enum: [PENDING, DISPATCHED, IN_PROGRESS, REPORTED, INSPECTED, STORED, CLOSED] }

    # V1.3.7 工序分配职责分离
    ProcessAllocation:
      type: object
      required: [workorderId, processSeq, decision, decidedByUserId]
      properties:
        id: { type: integer }
        workorderId: { type: integer }
        processSeq: { type: integer }
        decision: { type: string, enum: [INHOUSE, OUTSOURCE] }
        decidedByUserId: { type: integer, description: '生管 ID' }
        decidedAt: { type: string, format: date-time }

    ProcessAllocationVendor:
      type: object
      properties:
        id: { type: integer }
        allocationId: { type: integer }
        vendorId: { type: integer, description: '采购选' }
        unitPrice: { type: number, example: 8.50 }
        deliveryDate: { type: string, format: date }
        selectedByUserId: { type: integer, description: '采购 ID' }
        selectedAt: { type: string, format: date-time }
        status: { type: string, enum: [PENDING, CONFIRMED, REJECTED] }

    # 委外订单（含 7 状态机）
    OutsourceOrder:
      type: object
      properties:
        id: { type: integer }
        outsourceNo: { type: string, example: WW202606090001 }
        workorderId: { type: integer }
        vendorId: { type: integer }
        drawingId: { type: integer, description: '加工图纸 ID' }
        processCode: { type: string, example: P02 }
        qty: { type: integer }
        unitPrice: { type: number }
        totalAmount: { type: number }
        status:
          type: string
          enum: [PENDING_SHIP, SHIPPING, PENDING_INSPECTION, INSPECTING, QUALIFIED_STORAGE, STORED, REPAIR_REQUESTED, NOTIFIED_REPAIR]
          description: 'V1.3.4 升级 7 状态机'
        reworkCount: { type: integer, example: 0, description: 'V1.3.4 返修次数' }
        originalOutsourceOrderId: { type: integer, description: 'V1.3.4 返修关联原单' }
        isReworkReinspection: { type: boolean, default: false }
        deliveryDate: { type: string, format: date }
        actualDeliveryDate: { type: string, format: date }

    # 仓管到货扫码（V1.3.5）
    OutsourceArriveRequest:
      type: object
      required: [outsourceNo, actualQty, actualWeight]
      properties:
        outsourceNo: { type: string, example: WW202606090001 }
        actualQty: { type: integer, example: 50 }
        actualWeight: { type: number, example: 12.5, description: 'kg' }
        photoUrls: { type: array, items: { type: string } }
        remark: { type: string }

    # 委外 7 状态机历史（V1.3.7 · Story 1.22 · FR-6-2）
    OutsourceStateHistory:
      type: object
      description: '委外状态机迁移历史 · 100% 留痕'
      properties:
        id: { type: integer }
        outsourceId: { type: integer }
        outsourceNo: { type: string, example: 'WW20260612-0001' }
        fromState:
          type: string
          enum: [DRAFT, SUBMITTED, ACCEPTED, IN_PROGRESS, COMPLETED, REWORK, CLOSED]
        toState:
          type: string
          enum: [DRAFT, SUBMITTED, ACCEPTED, IN_PROGRESS, COMPLETED, REWORK, CLOSED]
        transitionType:
          type: string
          enum: [ADVANCE, ROLLBACK, REWORK]
        operatorUserId: { type: integer }
        operatorRole: { type: string, description: '生管/采购/品检/财务/admin（V1.3.7 AD-1）' }
        reason: { type: string }
        occurredAt: { type: string, format: date-time }

    # 委外状态机推进请求（V1.3.7 · Story 1.22 · FR-6-2）
    OutsourceStateAdvanceRequest:
      type: object
      required: [outsourceId, targetState]
      properties:
        outsourceId: { type: integer, description: '委外单主键 ID' }
        targetState:
          type: string
          enum: [DRAFT, SUBMITTED, ACCEPTED, IN_PROGRESS, COMPLETED, REWORK, CLOSED]
          description: '目标状态'
        operatorRole:
          type: string
          description: '操作员角色（V1.3.7 AD-1 生管/采购/品检/财务）'
          example: '采购'
        reason: { type: string, description: '推进原因' }

    # 委外状态机回退请求（V1.3.7 · Story 1.22 · FR-6-2）
    OutsourceStateRollbackRequest:
      type: object
      required: [outsourceId, reason]
      properties:
        outsourceId: { type: integer, description: '委外单主键 ID' }
        reason: { type: string, description: '回退原因（必填）' }
        operatorRole: { type: string, example: '品检' }

    # 委外返修单（V1.3.7 · Story 1.23 · FR-6-3）
    Rework:
      type: object
      description: '委外返修单（crm_rework）· 4 状态机：DRAFT/IN_PROGRESS/COMPLETED/CANCELLED'
      properties:
        id: { type: integer }
        reworkNo: { type: string, example: 'RW20260612-0001', description: 'RW{yyyyMMdd}{seq:4}' }
        outsourceId: { type: integer }
        outsourceNo: { type: string, example: 'WW20260612-0001' }
        reason: { type: string, description: '返修原因（必填 · P1 修补 2）' }
        cost: { type: number, example: 200.00, description: '返修成本（≥ 0 · 计入月度对账 · P1 修补 3）' }
        reworkCount: { type: integer, example: 1, description: '本次返修次序' }
        status: { type: string, enum: [DRAFT, IN_PROGRESS, COMPLETED, CANCELLED] }
        expectedFinishDate: { type: string, format: date }
        finishedAt: { type: string, format: date-time }
        createdBy: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # 返修历史（V1.3.7 · Story 1.23）
    ReworkHistory:
      type: object
      properties:
        id: { type: integer }
        reworkId: { type: integer }
        operation: { type: string, enum: [CREATE, FINISH, CANCEL] }
        beforeJson: { type: string, description: '变更前快照' }
        afterJson: { type: string, description: '变更后快照' }
        changedBy: { type: integer }
        changedAt: { type: string, format: date-time }

    # 返修次数预警（V1.3.7 · Story 1.23）
    ReworkAlert:
      type: object
      properties:
        id: { type: integer }
        outsourceId: { type: integer }
        outsourceNo: { type: string }
        reworkCount: { type: integer }
        alertLevel: { type: string, enum: [INFO, WARN, CRITICAL, EXCEED] }
        alertMessage: { type: string }
        alertedAt: { type: string, format: date-time }

    # 返修单创建请求（V1.3.7 · Story 1.23 · FR-6-3）
    ReworkCreateRequest:
      type: object
      required: [outsourceId, reason]
      properties:
        outsourceId: { type: integer, description: '委外单主键 ID' }
        reason: { type: string, description: '返修原因（必填）', example: '调质硬度不达标' }
        cost: { type: number, example: 200.00, description: '返修成本（≥ 0）' }

    # 月度对账（V1.3.6 + V1.3.7 · 不含"线下" · Story 1.21 5 状态机）
    Reconcile:
      type: object
      description: 'V1.3.7 AD-2 红线：不含"线下"动作。状态机：DRAFT(1) → VENDOR_CONFIRMED(2) → BOTH_CONFIRMED(3) → FINANCE_CONFIRMED(4) → CLOSED'
      properties:
        id: { type: integer }
        reconcileNo: { type: string, example: 'RC202605-0001', description: 'RC{yyyyMM}{seq:4}（按月隔离）' }
        vendorId: { type: integer }
        vendorName: { type: string }
        periodYear: { type: integer, example: 2026 }
        periodMonth: { type: integer, example: 5, description: '1-12' }
        totalAmount: { type: number, example: 50000.00 }
        status: { type: string, enum: [DRAFT, VENDOR_CONFIRMED, BOTH_CONFIRMED, FINANCE_CONFIRMED, CLOSED] }
        currentStep: { type: integer, example: 1, description: '1-4 步' }
        isLocked: { type: boolean, description: '对账期锁定' }
        createdBy: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # 对账明细（Story 1.21）
    ReconcileItem:
      type: object
      properties:
        id: { type: integer }
        reconcileId: { type: integer }
        outsourceOrderId: { type: integer }
        outsourceOrderNo: { type: string, example: 'WW20260612-0001' }
        itemName: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }
        amount: { type: number }
        vendorAmount: { type: number, description: '厂商确认金额（AC-6.1.2）' }
        finalAmount: { type: number, description: '最终对账金额' }
        isConsistent: { type: boolean, description: '金额是否一致（40905 校验）' }
        sort: { type: integer }

    # 对账签字扫描件（Story 1.21 · AES-256-GCM）
    ReconcileSignature:
      type: object
      properties:
        id: { type: integer }
        reconcileId: { type: integer }
        signerUserId: { type: integer }
        signerName: { type: string }
        signatureImagePath: { type: string }
        encryptedData: { type: string, description: 'AES-256-GCM 加密 Base64' }
        iv: { type: string, description: '12 字节 IV 唯一（Base64）' }
        authTag: { type: string, description: '128-bit GCM tag（Base64）' }
        signedAt: { type: string, format: date-time }

    # 对账创建请求（Story 1.21）
    ReconcileCreateRequest:
      type: object
      required: [vendorId, vendorName, periodYear, periodMonth]
      properties:
        vendorId: { type: integer }
        vendorName: { type: string }
        periodYear: { type: integer, example: 2026 }
        periodMonth: { type: integer, example: 5 }
        items:
          type: array
          items: { $ref: '#/components/schemas/ReconcileItem' }

    # 对账明细请求
    ReconcileItemRequest:
      type: object
      required: [outsourceOrderId, itemName, quantity, unitPrice]
      properties:
        outsourceOrderId: { type: integer }
        outsourceOrderNo: { type: string }
        itemName: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }

    # 厂商对账确认请求（AC-6.1.2 · 40905）
    ReconcileVendorConfirmRequest:
      type: object
      required: [vendorAmounts]
      properties:
        vendorAmounts:
          type: array
          items:
            type: object
            required: [itemId, vendorAmount]
            properties:
              itemId: { type: integer }
              vendorAmount: { type: number, description: '厂商确认金额（与 amount 一致才能通过 · 40905）' }

    # 料号 5 段成本（V1.3.4）
    CostAggregate:
      type: object
      properties:
        materialCode: { type: string, example: YL-45-D80 }
        period: { type: string, example: '2026-05' }
        materialCost: { type: number, description: '材料成本' }
        laborCost: { type: number, description: '工时成本' }
        surfaceCost: { type: number, description: '表处成本' }
        outsourceCost: { type: number, description: '外协成本' }
        mfgCost: { type: number, description: '管理费分摊' }
        totalCost: { type: number, description: '总成本' }
        version: { type: integer }
        computedAt: { type: string, format: date-time }

    # 厂商资料（V1.3.7 邮箱必填 + 电话选填）
    Vendor:
      type: object
      required: [vendorName, contactEmail]
      properties:
        id: { type: integer }
        vendorCode: { type: string, example: GYS202606090001 }
        vendorName: { type: string, example: 张家港A厂 }
        capabilities: { type: array, items: { type: string }, example: [车, 铣, 表处] }
        creditLevel: { type: string, enum: [A, B, C, D] }
        contactEmail:
          type: string
          format: email
          description: 'V1.3.7 仍必填（163 邮箱推送）'
        contactPhone:
          type: string
          description: 'V1.3.7 改选填（短信下线后非关键路径）'
        notifyChannel:
          type: string
          enum: [email_163]
          default: email_163
          description: 'V1.3.7 收窄为单 163 邮箱'
        defaultReconEmail: { type: string, format: email, description: 'V1.3.6 对账单邮箱' }
        avgDeliveryDays: { type: integer, description: 'V1.3.4 近 3 次中位数' }

    # 邮件发送日志（V1.3.7）
    EmailSendLog:
      type: object
      properties:
        id: { type: integer }
        toAddress: { type: string, format: email }
        subject: { type: string }
        attachmentHash: { type: string, description: '附件 SHA-256' }
        smtpResponse: { type: string }
        status: { type: string, enum: [PENDING, SENT, FAILED, RETRY_1H, RETRY_6H, RETRY_24H, DEAD] }
        retryCount: { type: integer }
        sentAt: { type: string, format: date-time }

    # 邮件配置（V1.3.7）
    EmailConfig:
      type: object
      properties:
        smtpHost: { type: string, example: smtp.163.com }
        smtpPort: { type: integer, example: 465 }
        useSsl: { type: boolean, default: true }
        fromAddress: { type: string, example: noreply@yourcompany.com }
        authCode: { type: string, description: 'KMS 注入（不返回给前端）', writeOnly: true }
        retryPolicy: { type: array, items: { type: string }, example: ['1h', '6h', '24h'] }
        dailyQuota: { type: integer, example: 5000 }
        quotaWarnThreshold: { type: number, example: 0.8 }
        logRetentionDays: { type: integer, example: 90 }
        attachmentMaxSizeMb: { type: integer, example: 10 }

    # ====== Story 1.2 审批工作流配置（9 端点 schema） ======
    WorkflowCreateRequest:
      type: object
      required: [workflowCode, nodesJson]
      properties:
        workflowCode: { type: string, pattern: '^[A-Z_]{2,50}$', example: CUSTOM_FLOW }
        nodesJson:
          type: string
          description: 节点 JSON 数组（1..20 节点）
          example: '[{"node_index":1,"node_type":"START"},{"node_index":2,"node_type":"APPROVAL","role_code":"OWNER","threshold":50000},{"node_index":3,"node_type":"END"}]'
        conditionsJson:
          type: string
          description: 条件 JSON（amount_field 必填）
          example: '{"amount_field":"total_amount"}'

    WorkflowUpdateRequest:
      type: object
      properties:
        nodesJson: { type: string }
        conditionsJson: { type: string }
        status: { type: string, enum: [ACTIVE, INACTIVE] }

    WorkflowVO:
      type: object
      properties:
        id: { type: integer, example: 1 }
        workflowCode: { type: string, example: QUOTE_FLOW }
        nodes:
          type: array
          items: { $ref: '#/components/schemas/WorkflowNodeVO' }
        conditionsJson: { type: string }
        status: { type: string, enum: [ACTIVE, INACTIVE, DELETED] }
        version: { type: integer, example: 1 }

    WorkflowNodeVO:
      type: object
      properties:
        nodeIndex: { type: integer, example: 2 }
        nodeType: { type: string, enum: [START, APPROVAL, CC, END] }
        roleCode: { type: string, example: dept_manager }
        threshold: { type: number, example: 200000.00 }
        orSignRequired: { type: boolean, example: false, description: 'V1.3.7 P1 修补 OR 会签' }

    WorkflowTestRequest:
      type: object
      required: [amount]
      properties:
        amount: { type: number, example: 80000.00 }
        applicantRole: { type: string, example: salesperson }

    WorkflowTestResult:
      type: object
      properties:
        matchedNodeIndex: { type: integer, example: 2 }
        matchedRole: { type: string, example: dept_manager }
        candidates: { type: array, items: { type: integer }, example: [10010, 10011] }
        orSignRequired: { type: boolean, example: false }
        trace: { type: array, items: { type: string } }

    ApprovalCreateRequest:
      type: object
      required: [bizType, bizId, amount, applicantUserId]
      properties:
        bizType: { type: string, enum: [QUOTE, ORDER, PURCHASE, PAYMENT, OTHER] }
        bizId: { type: string, example: BJ202606100002, maxLength: 50 }
        amount: { type: number, example: 60000.00 }
        applicantUserId: { type: integer, example: 10086 }
        workflowCode: { type: string, description: 可选，默认按 bizType 选 }
        comment: { type: string }

    ApprovalVO:
      type: object
      properties:
        id: { type: integer }
        bizType: { type: string, enum: [QUOTE, ORDER, PURCHASE, PAYMENT, OTHER] }
        bizId: { type: string }
        workflowCode: { type: string }
        currentNodeIndex: { type: integer }
        currentApproverUserId: { type: integer }
        candidates: { type: array, items: { type: integer } }
        orSignRequired: { type: boolean, description: 'V1.3.7 P1 修补' }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED, SKIPPED, WAITING] }
        skipReason: { type: string, enum: [ON_LEAVE, ON_TRIP, DISABLED, RESIGNED] }
        timeoutAt: { type: string, format: date-time }
        isOverdue: { type: boolean }
        nodeSkipped: { type: boolean }

    ApproveRequest:
      type: object
      required: [approverUserId]
      properties:
        approverUserId: { type: integer, example: 10010 }
        comment: { type: string, maxLength: 500, example: 同意 }

    RejectRequest:
      type: object
      required: [approverUserId, reason]
      properties:
        approverUserId: { type: integer, example: 10010 }
        reason: { type: string, minLength: 1, maxLength: 500, example: 价格超出预算 }

    # ===== V1.3.7 + V1.3.8 schemas（Story 10.1 fix：从原文件末尾重复 components 块并入）=====
    # V1.3.7 · Story 1.7 · E3-Drawing 8 DTO
    Drawing:
      type: object
      description: 图纸主表 · 4 状态机（DRAFT/RELEASED/ARCHIVED/OBSOLETE）
      properties:
        id: { type: integer }
        drawingNo:
          type: string
          description: 图号 DWG-YYYYMMDD-NNNN · 唯一索引（P1 修补）
          example: DWG-20260612-0001
        version:
          type: string
          description: 版本 v1 < v2 < v3 严格递增（P1 修补）
          example: v1
        title: { type: string }
        materialCode:
          type: string
          description: 物料编码 WL-XXXX 唯一索引
          example: WL-1001
        processRoute:
          type: string
          description: 工艺路线 JSON（5 段成本聚合 · V1.3.4 留 1.9 BOM）
        status:
          type: string
          enum: [DRAFT, RELEASED, ARCHIVED, OBSOLETE]
        pdfPath: { type: string }
        signatureScanPath:
          type: string
          description: 签字扫描件路径（AES-256-GCM 加密存储 · V1.3.6 红线）
        isEncrypted:
          type: integer
          description: 加密标记（P1 修补 · AES-256-GCM）
          enum: [0, 1]
        isFa:
          type: integer
          description: FA 件 · > 20万 二次密码
          enum: [0, 1]
        isNew:
          type: integer
          enum: [0, 1]
        ownerUserId: { type: integer }
        deptId: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DrawingVersion:
      type: object
      description: 图纸版本历史
      properties:
        id: { type: integer }
        drawingId: { type: integer }
        version: { type: string, example: v2 }
        pdfPath: { type: string }
        signatureScanPath: { type: string }
        isEncrypted: { type: integer, enum: [0, 1] }
        changeReason: { type: string }
        changedBy: { type: integer }
        changedAt: { type: string, format: date-time }

    DrawingCreateRequest:
      type: object
      required: [title, materialCode, processRoute]
      properties:
        drawingNo:
          type: string
          description: 图号（自动生成）
          example: DWG-20260612-0001
        title: { type: string }
        materialCode:
          type: string
          pattern: '^WL-\d{4}$'
          example: WL-1001
        processRoute:
          type: string
          description: 工艺路线 JSON（至少 1 工序）
        isFa: { type: integer, enum: [0, 1], default: 0 }
        isNew: { type: integer, enum: [0, 1], default: 0 }
        pdfPath: { type: string }
        signatureScanPath: { type: string }
        comment: { type: string }

    DrawingUpdateRequest:
      type: object
      properties:
        title: { type: string }
        materialCode:
          type: string
          pattern: '^WL-\d{4}$'
        processRoute: { type: string }
        pdfPath: { type: string }
        signatureScanPath: { type: string }
        comment: { type: string }

    DrawingVersionRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
          pattern: '^v\d+$'
          description: 版本号 v\d+ 严格递增
          example: v2
        changeReason: { type: string }
        pdfPath: { type: string }
        signatureScanPath: { type: string }

    DrawingReleaseRequest:
      type: object
      description: 发布请求 · > 20万 走二次密码
      properties:
        adminPassword:
          type: string
          description: 管理员二次密码（FA 件 > 20万 必填）
        candidates:
          type: array
          description: OR 会签候选人
          items: { type: integer }
        comment: { type: string }

    DrawingArchiveRequest:
      type: object
      properties:
        comment: { type: string }

    DrawingSignatureRequest:
      type: object
      properties:
        version: { type: string, example: v1 }
        signerUserId: { type: integer }
        signatureImagePath:
          type: string
          description: 签字图片（AES-256-GCM 加密后存储）
        iv: { type: string, description: GCM 初始化向量（IV 唯一） }

    # V1.3.7 · Story 1.7 · 3 P1 修补 Schema 描述
    DrawingP1Fixes:
      type: object
      description: 3 P1 修补说明
      properties:
        uniqueDrawingNoIndex:
          type: string
          description: 图号 + 版本 唯一复合索引 (drawing_no, version) - 数据库层兜底
        strictlyIncreasingVersion:
          type: string
          description: 版本号严格递增校验 v1 < v2 < v3，禁止跳跃和回退
        aes256GcmEncryption:
          type: string
          description: AES-256-GCM 加密签字扫描件（V1.3.6 红线 · 128-bit GCM tag · IV 唯一）

    # V1.3.7 · Story 1.7 · 4 状态枚举
    DrawingStatus:
      type: string
      description: 图纸状态机（DRAFT → RELEASED → ARCHIVED + OBSOLETE）
      enum: [DRAFT, RELEASED, ARCHIVED, OBSOLETE]

    # V1.3.7 · Story 1.7 · 5 变更操作
    DrawingOperation:
      type: string
      description: 图纸变更操作枚举
      enum: [CREATE, UPDATE, ADD_VERSION, RELEASE, ARCHIVE, OBSOLETE]

    # ===== V1.3.9 Sprint 12 Story 12.1 图纸权限矩阵 Schemas =====

    DrawingPermissionDTO:
      type: object
      description: 图纸权限位 DTO（permission 端点返回）
      properties:
        drawingId: { type: integer, format: int64 }
        role:
          type: string
          description: 用户主角色
          enum: [ENGINEER, PROD_PLANNER, SALES, PURCHASER, WAREHOUSE, QC, OPERATOR, FINANCE]
        scope:
          type: string
          description: 权限 scope（与金额 ACL 独立命名空间）
          enum: [ALL, ORDER, PO, INCOMING, INSPECTION, WORKORDER_PROCESS, NONE]
        permissions:
          $ref: '#/components/schemas/DrawingPermissionBits'
        linkedBizIds:
          type: object
          description: 关联业务单据 ID 列表（按 biz_type 分桶）
          properties:
            ORDER: { type: array, items: { type: integer, format: int64 } }
            PO: { type: array, items: { type: integer, format: int64 } }
            INCOMING: { type: array, items: { type: integer, format: int64 } }
            INSPECTION: { type: array, items: { type: integer, format: int64 } }
            WORKORDER_PROCESS: { type: array, items: { type: integer, format: int64 } }
        expiresAt:
          type: string
          format: date-time
          description: 权限查询结果缓存过期时间（5 分钟）

    DrawingPermissionBits:
      type: object
      description: 5 操作位（7 角色 × 5 操作矩阵）
      properties:
        view: { type: boolean, description: "预览权限" }
        print: { type: boolean, description: "打印权限" }
        download: { type: boolean, description: "下载原文件权限（仅 ENGINEER）" }
        upload: { type: boolean, description: "上传权限（仅 ENGINEER）" }
        delete: { type: boolean, description: "删除权限（仅 ENGINEER）" }

    # ============================================================
    # V1.3.9 Sprint 13 Story 13.3 · 真实查询响应 schemas
    # ============================================================
    DrawingLinkListResponse:
      type: object
      description: 图纸关联业务单据列表响应（13.3 端点 1）
      properties:
        drawingId: { type: integer, format: int64, description: "图纸 ID" }
        bizType:
          type: string
          enum: [ORDER, PO, INCOMING, INSPECTION, WORKORDER_PROCESS]
          description: 业务类型
        bizIds:
          type: array
          items: { type: integer, format: int64 }
          description: 关联业务单据 ID 列表
        totalCount: { type: integer, description: "总数" }
        querySource:
          type: string
          enum: [DB_REAL, CACHE]
          description: 数据来源
        queriedAt: { type: string, format: date-time, description: "查询时间" }

    AccessibleDrawingListResponse:
      type: object
      description: 业务单据可访问图纸列表响应（13.3 端点 2 · Redis 5min 缓存）
      properties:
        bizType: { type: string, description: "业务类型" }
        bizId: { type: integer, format: int64, description: "业务单据 ID" }
        drawings:
          type: array
          items: { $ref: '#/components/schemas/AccessibleDrawing' }
          description: 可访问图纸列表
        totalCount: { type: integer, description: "总数" }
        cacheHit: { type: boolean, description: "Redis 缓存是否命中" }
        queriedAt: { type: string, format: date-time, description: "查询时间" }

    AccessibleDrawing:
      type: object
      description: 可访问图纸条目
      properties:
        drawingId: { type: integer, format: int64, description: "图纸 ID" }
        drawingCode: { type: string, description: "图纸代号" }
        drawingName: { type: string, description: "图纸名称" }
        version: { type: string, description: "版本号" }
        thumbnailUrl: { type: string, description: "缩略图 URL" }
        permissionLevel:
          type: string
          enum: [VIEW, PRINT, EDIT]
          description: "权限级别（5 操作矩阵裁剪）"

    OperatorProcessDrawingResponse:
      type: object
      description: OPERATOR 工序可访问图纸列表响应（13.3 端点 3 · Redis 5min 缓存）
      properties:
        processId: { type: integer, format: int64, description: "工序 ID" }
        processCode: { type: string, description: "工序代号" }
        processName: { type: string, description: "工序名称" }
        workOrderId: { type: integer, format: int64, description: "工单 ID" }
        workOrderCode: { type: string, description: "工单代号" }
        status:
          type: string
          enum: [IN_PROGRESS, PENDING, COMPLETED]
          description: "工序状态"
        operatorUserId: { type: integer, format: int64, description: "操作工用户 ID" }
        drawings:
          type: array
          items: { $ref: '#/components/schemas/ProcessDrawing' }
          description: 可访问图纸列表
        totalCount: { type: integer, description: "总数" }
        cacheHit: { type: boolean, description: "Redis 缓存是否命中" }
        queriedAt: { type: string, format: date-time, description: "查询时间" }

    ProcessDrawing:
      type: object
      description: 工序可访问图纸条目
      properties:
        drawingId: { type: integer, format: int64, description: "图纸 ID" }
        drawingCode: { type: string, description: "图纸代号" }
        drawingName: { type: string, description: "图纸名称" }
        thumbnailUrl: { type: string, description: "缩略图 URL" }
        permissionLevel:
          type: string
          enum: [VIEW, PRINT, EDIT]
          description: "权限级别（OPERATOR 默认 VIEW）"

    DrawingAclErrorResponse:
      type: object
      description: 图纸 ACL 错误响应（统一 40304）
      properties:
        code: { type: integer, example: 40304 }
        message:
          type: string
          example: "该图纸未关联您的订单"
          description: |
            角色定制消息：
            - FINANCE → "FINANCE 角色无图纸权限"
            - SALES 不关联订单 → "该图纸未关联您的订单"
            - PURCHASER/WAREHOUSE/QC 类似
            - OPERATOR 工序不关联 → "当前工序未关联该图纸"

    # ===== V1.3.8 Sprint 7-10 Schemas =====
    BatchCreateRequest:
      type: object
      required: [poId, arrivedAt, items]
      properties:
        poId: { type: integer, format: int64 }
        arrivedAt: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: '#/components/schemas/BatchItem' }

    BatchItem:
      type: object
      required: [materialId, quantity]
      properties:
        materialId: { type: integer, format: int64 }
        quantity: { type: integer }
        poItemId: { type: integer, format: int64 }

    BatchCreateResponse:
      type: object
      properties:
        batches:
          type: array
          items: { $ref: '#/components/schemas/BatchInfo' }
        poStatusAfter:
          type: string
          enum: [PENDING_SHIP, PARTIAL_ARRIVED, ALL_ARRIVED, CANCELLED]
        qualityOrders:
          type: array
          items: { type: string }

    BatchInfo:
      type: object
      properties:
        batchNo: { type: string }
        materialId: { type: integer, format: int64 }
        quantity: { type: integer }

    PoStatusResponse:
      type: object
      properties:
        poId: { type: integer, format: int64 }
        poStatus: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/PoStatusItem' }

    PoStatusItem:
      type: object
      properties:
        materialId: { type: integer, format: int64 }
        ordered: { type: integer }
        arrived: { type: integer }
