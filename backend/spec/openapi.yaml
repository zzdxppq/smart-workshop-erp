      operationId: listReconciles
      parameters:
        - name: vendorId
          in: query
          schema: { type: integer }
        - name: periodYear
          in: query
          schema: { type: integer }
        - name: periodMonth
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string, enum: [DRAFT, VENDOR_CONFIRMED, BOTH_CONFIRMED, FINANCE_CONFIRMED, CLOSED] }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list: { type: array, items: { $ref: '#/components/schemas/Reconcile' } }
                          page: { type: integer }
                          size: { type: integer }

  /reconciles/{id}/detail:
    get:
      tags: [E6-Reconcile]
      summary: 对账单详情（主单 + 明细 + 签字）
      operationId: getReconcileDetail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          reconcile: { $ref: '#/components/schemas/Reconcile' }
                          items: { type: array, items: { $ref: '#/components/schemas/ReconcileItem' } }
                          signatures: { type: array, items: { $ref: '#/components/schemas/ReconcileSignature' } }

  /reconciles/{id}/items:
    post:
      tags: [E6-Reconcile]
      summary: 追加对账明细（AC-6.1.1）
      operationId: addReconcileItem
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReconcileItemRequest' }
      responses:
        '200': { description: 成功 }
        '40001': { description: 参数缺失 }
        '40404': { description: 对账单不存在 }

  /reconciles/{id}/upload-signature:
    post:
      tags: [E6-Reconcile]
      summary: 上传厂商签字扫描件（V1.3.7 AD-2 · 不含"线下" · AES-256-GCM 加密）
      description: |
        **V1.3.7 AD-2 红线**：通过电子方式上传，不允许线下传递
        **加密**：AES-256-GCM · IV 唯一 · 128-bit GCM tag
        **厂商签字必传**（P1 修补 3）
      operationId: uploadReconcileSignature
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, signerName]
              properties:
                file:
                  type: string
                  format: binary
                  description: 'PDF / JPG / PNG · ≤ 10MB'
                signerName:
                  type: string
                  description: '厂商签字人姓名'
      responses:
        '200':
          description: 成功（自动 AES-256-GCM 加密）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ReconcileSignature' }

