        '200': { description: 成功，返回 matchedNode/matchedRole/candidates/orSignRequired/trace }

  /approvals/pending:
    get:
      tags: [E1-Workflow]
      summary: 待办列表（作为审批人）
      operationId: pendingApprovals
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: approverUserId
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }

  /approvals/my-pending:
    get:
      tags: [E1-Workflow]
      summary: 我的待办（作为申请人，看自己提交的单子进度）
      operationId: myPendingApprovals
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: applicantUserId
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }

  /approvals/{id}/approve:
    post:
      tags: [E1-Workflow]
      summary: 审批通过（V1.3.7 P1 修补 OR 会签）
      operationId: approve
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproveRequest' }
      responses:
        '200': { description: 成功 }
        '40303': { description: 审批人不在 candidates 列表 }
        '40904': { description: 审批单已结束 / 重复 approve }

  /approvals/{id}/reject:
    post:
      tags: [E1-Workflow]
      summary: 审批驳回（reason 必填）
      operationId: reject
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectRequest' }
      responses:
        '200': { description: 成功 }
        '40009': { description: 驳回 reason 为空 }
        '40904': { description: 状态机不匹配 }

  /approvals/{id}/urge:
    post:
      tags: [E1-Workflow]
      summary: 催办（V1.3.7 · 不重置 timeout_at）
      operationId: urge
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: operatorUserId
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }

  /approvals/callback/quote-to-order:
    post:
      tags: [E1-Workflow]
      summary: 报价转订单触发自动审批（Service Token 守）
      operationId: callbackQuoteToOrder
      parameters:
        - name: X-Service-Token
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quoteId: { type: string }
                orderId: { type: string }
      responses:
        '200': { description: 成功 }
        '40101': { description: Service Token 无效 }

  /approvals/callback/order-cancel:
    post:
      tags: [E1-Workflow]
      summary: 订单取消反向同步审批（Service Token 守）
      operationId: callbackOrderCancel
      parameters:
        - name: X-Service-Token
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId: { type: string }
                bizType: { type: string }
      responses:
        '200': { description: 成功 }
        '40101': { description: Service Token 无效 }

  /app/sync:
    post:
      tags: [E1-App]
      summary: APP 离线数据批量同步
      operationId: appSync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId: { type: string }
                records:
                  type: array
                  items: { type: object }
                  maxItems: 500
      responses:
        '200': { description: 成功 }

  /app/messages:
    get:
      tags: [E1-App]
      summary: APP 消息中心
      operationId: appMessages
      parameters:
        - name: unreadOnly
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200': { description: 成功 }

  # ---------- 邮件配置（V1.3.7 新增） ----------
  /email/config:
    get:
      tags: [E1-Email]
      summary: 获取邮件配置
      operationId: getEmailConfig
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/EmailConfig' }
    put:
      tags: [E1-Email]
      summary: 更新邮件配置
      operationId: updateEmailConfig
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailConfig' }
      responses:
        '200': { description: 成功 }

  /email/test:
    post:
      tags: [E1-Email]
      summary: 测试发送
      operationId: testEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                toAddress: { type: string, format: email }
                subject: { type: string }
                body: { type: string }
      responses:
        '200': { description: 成功 }
        '50203': { description: 163 SMTP 失败 }

  /email/logs:
    get:
      tags: [E1-Email]
      summary: 发送日志查询
      operationId: emailLogs
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema: { type: string, enum: [PENDING, SENT, FAILED, DEAD] }
      responses:
        '200': { description: 成功 }

  # ============================================================
  # E2 - 客户与销售
  # ============================================================
  /customers:
    get:
      tags: [E2-CRM]
      summary: 客户列表
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: ownerId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200': { description: 成功 }
    post:
      tags: [E2-CRM]
      summary: 创建客户
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Customer' }
      responses:
        '200': { description: 成功 }

  /customers/{id}/claim:
    post:
      tags: [E2-CRM]
      summary: 客户领用（30 天保护期）
      operationId: claimCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40903': { description: 保护期内 }

  /quotes:
    get:
      tags: [E2-Quote]
      summary: 报价列表（6 维过滤：status/customerId/owner/dateFrom/dateTo/page/size）
      operationId: listQuotes
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [DRAFT, SUBMITTED, APPROVED, REJECTED, CONVERTED] }
        - name: customerId
          in: query
          required: false
          schema: { type: integer }
        - name: owner
          in: query
          required: false
          schema: { type: integer }
        - name: dateFrom
          in: query
          required: false
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          required: false
          schema: { type: string, format: date }
      responses:
        '200': { description: 成功 }
        '40303': { description: 无权限 }
    post:
      tags: [E2-Quote]
      summary: 创建报价（多级审批：< 5万 业务员；5-20万 部门经理；> 20万 总经理 + 财务总监双签）
      operationId: createQuote
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuoteCreateRequest' }
      responses:
        '200': { description: 成功 }
        '40001': { description: 字段校验失败（QUOTE_ITEMS_EMPTY/QUOTE_DELIVERY_DATE_INVALID） }
        '40902': { description: 黑名单客户 CUSTOMER_BLACKLIST }

  /quotes/{id}:
    get:
      tags: [E2-Quote]
      summary: 查询报价详情（含历史变更记录）
      operationId: getQuote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40401': { description: 报价不存在 }
    put:
      tags: [E2-Quote]
      summary: 修改报价（仅 DRAFT 状态可改）
      operationId: updateQuote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuoteUpdateRequest' }
      responses:
        '200': { description: 成功 }
        '40903': { description: QUOTE_NOT_EDITABLE（SUBMITTED/APPROVED 状态不可改） }

  /quotes/{id}/submit:
    post:
      tags: [E2-Quote-Flow]
      summary: 提交审批（DRAFT → SUBMITTED，触发 stream:notify 4 通道推送）
      operationId: submitQuote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40904': { description: QUOTE_STATE_INVALID（状态机越权） }

  /quotes/{id}/approve:
    post:
      tags: [E2-Quote-Flow]
      summary: 审批通过（SUBMITTED → APPROVED，OR 会签 + 跳过请假 + 二次密码 > 20万）
      operationId: approveQuote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuoteApproveRequest' }
      responses:
        '200': { description: 成功 }
        '40904': { description: 状态机越权 }

  /quotes/{id}/reject:
    post:
      tags: [E2-Quote-Flow]
      summary: 驳回（SUBMITTED → REJECTED，含 reason）
      operationId: rejectQuote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuoteRejectRequest' }
      responses:
        '200': { description: 成功 }
        '40904': { description: 状态机越权 }

  /quotes/export/{id}:
    get:
      tags: [E2-Quote-Export]
      summary: 导出 PDF / Excel（1h 缓存 + 审计留痕）
      operationId: exportQuote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [pdf, excel], default: pdf }
      responses:
        '200':
          description: 二进制流
          content:
            application/pdf: { schema: { type: string, format: binary } }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: { schema: { type: string, format: binary } }
        '40401': { description: 报价不存在 }

  /quotes/{id}/convert-to-order:
    post:
      tags: [E2-Quote]
      summary: 报价转订单（APPROVED → CONVERTED，生成 XS{yyyyMMdd}{seq:4} 订单号）
      operationId: convertQuoteToOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuoteConvertRequest' }
      responses:
        '200': { description: 成功 }
        '40904': { description: QUOTE_STATE_INVALID（非 APPROVED 状态） }

  # ============================================================
  # E3-Order · Story 1.6 · AC-2.3.1/2/3/4 · 订单管理 8 端点
  # ============================================================
  /orders:
    get:
      tags: [E3-Order]
      summary: 订单列表（按权限过滤：业务员 owner / 经理 dept / 总经理 all）
      operationId: listOrders
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          required: false
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [DRAFT, CONFIRMED, PRODUCING, PARTIAL_SHIPPED, SHIPPED, SETTLED, CLOSED, CANCELLED] }
        - name: customerId
          in: query
          required: false
          schema: { type: integer }
        - name: owner
          in: query
          required: false
          schema: { type: integer }
        - name: role
          in: query
          required: false
          schema: { type: string, enum: [salesperson, dept_manager, gm], default: gm }
        - name: deptId
          in: query
          required: false
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40302': { description: DATA_SCOPE（越权访问） }
    post:
      tags: [E3-Order]
      summary: 创建订单（XS{yyyyMMdd}{seq:4} 单号 + 信用额度校验 40909 + 黑名单 40902）
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderCreateRequest' }
      responses:
        '200': { description: 成功 }
        '40001': { description: ORDER_CUSTOMER_REQUIRED / ORDER_ITEMS_EMPTY / ORDER_DELIVERY_DATE_INVALID }
        '40003': { description: ORDER_QUANTITY_INVALID / ORDER_UNIT_PRICE_INVALID / ORDER_QUANTITY_ADJUSTMENT_INVALID }
        '40902': { description: CUSTOMER_BLACKLIST（黑名单优先） }
        '40909': { description: CREDIT_LIMIT_EXCEEDED（信用额度超限） }

  /orders/{id}:
    get:
      tags: [E3-Order]
      summary: 查询订单详情（含状态机 + 历史 + 转生产/委外链路）
      operationId: getOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40401': { description: ORDER_NOT_FOUND }
    put:
      tags: [E3-Order]
      summary: 修改订单（仅 DRAFT 状态可改）
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderUpdateRequest' }
      responses:
        '200': { description: 成功 }
        '40903': { description: ORDER_NOT_EDITABLE（仅 DRAFT 可改） }

  /orders/{id}/confirm:
    post:
      tags: [E3-Order-Flow]
      summary: 确认订单（DRAFT → CONFIRMED，触发 4 通道推送）
      operationId: confirmOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderConfirmRequest' }
      responses:
        '200': { description: 成功 }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/{id}/approve:
    post:
      tags: [E3-Order-Flow]
      summary: 审批通过（CONFIRMED → PRODUCING，4 阈值路由复用 1.5）
      operationId: approveOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/{id}/reject:
    post:
      tags: [E3-Order-Flow]
      summary: 驳回（CONFIRMED → DRAFT，含 reason 必填）
      operationId: rejectOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, description: '驳回原因' }
      responses:
        '200': { description: 成功 }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/{id}/cancel:
    post:
      tags: [E3-Order-Flow]
      summary: 取消订单（→ CANCELLED）
      operationId: cancelOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderCancelRequest' }
      responses:
        '200': { description: 成功 }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/{id}/convert-to-production:
    post:
      tags: [E3-Order-Transfer]
      summary: 转生产（CONFIRMED → PRODUCING，生成 GD{yyyyMMdd}{seq:4} 工单号，Epic 5 hook）
      operationId: convertOrderToProduction
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/{id}/convert-to-outsource:
    post:
      tags: [E3-Order-Transfer]
      summary: 转委外（生成 WW{yyyyMMdd}{seq:4} 单号，Epic 6 hook）
      operationId: convertOrderToOutsource
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/{id}/ship:
    post:
      tags: [E3-Order-Transfer]
      summary: 发货（PRODUCING → SHIPPED/PARTIAL_SHIPPED，累计 shippedQty）
      operationId: shipOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: { type: integer }
              description: 'itemId -> quantity 部分发货映射'
      responses:
        '200': { description: 成功 }
        '40003': { description: ORDER_SHIP_QTY_EXCEEDED }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/{id}/settle:
    post:
      tags: [E3-Order-Transfer]
      summary: 结算（SHIPPED → SETTLED，触发回款 + Epic 9 hook）
      operationId: settleOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/{id}/close:
    post:
      tags: [E3-Order-Transfer]
      summary: 关闭（SETTLED → CLOSED 终态）
      operationId: closeOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40904': { description: ORDER_STATE_INVALID }

  /orders/export/{id}:
    get:
      tags: [E3-Order-Export]
      summary: 导出 PDF/Excel（PDF 1h 缓存，OpenPDF 1.3.34 / POI 5.2.5）
      operationId: exportOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [pdf, excel], default: pdf }
      responses:
        '200':
          description: 二进制流
          content:
            application/pdf: { schema: { type: string, format: binary } }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: { schema: { type: string, format: binary } }
        '40401': { description: ORDER_NOT_FOUND }

  /orders/{id}/profit:
    get:
      tags: [E3-Order-Export]
      summary: 订单利润分析（利润 = 订单金额 - 生产成本 - 委外成本 - 材料成本，负利润告警）
      operationId: orderProfit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '40401': { description: ORDER_NOT_FOUND }

  /orders/{id}/profit/export:
    get:
      tags: [E3-Order-Export]
      summary: 订单利润分析 PDF 导出
      operationId: exportOrderProfit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }

  # ============================================================
  # E3 - 图纸与物料
  # ============================================================
  /drawings:
    post:
      tags: [E3-Drawing]
      summary: 1. 创建图纸（AC-3.1.1）
      operationId: createDrawing
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DrawingCreateRequest' }
      parameters:
        - name: operatorUserId
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Drawing' }
    get:
      tags: [E3-Drawing]
      summary: 4. 列表查询 6 维过滤（AC-3.1.4）
      operationId: listDrawings
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: version
          in: query
          schema: { type: string, example: v1 }
        - name: category
          in: query
          schema: { type: string }
        - name: customerId
          in: query
          schema: { type: integer }
        - name: isFa
          in: query
          schema: { type: integer, enum: [0, 1] }
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, RELEASED, ARCHIVED, OBSOLETE]
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items: { $ref: '#/components/schemas/Drawing' }
                  total: { type: integer }
                  page: { type: integer }
                  size: { type: integer }

  /drawings/upload:
    post:
      tags: [E3-Drawing]
      summary: 上传图纸文件（PDF / DWG / STEP · Story 10.1 fix：原 /drawings multipart 迁到子路径以避免与 createDrawing POST 冲突）
      operationId: uploadDrawing
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                drawingNo: { type: string }
                version: { type: string, example: v1.0 }
      responses:
        '200': { description: 成功 }

  /boms:
    post:
      tags: [E3-Drawing]
      summary: 创建 BOM
      operationId: createBOM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productCode: { type: string }
                bomVersion: { type: string }
                lines:
                  type: array
                  items:
                    type: object
                    properties:
                      parentCode: { type: string }
                      childCode: { type: string }
                      qty: { type: number }
                      lossRate: { type: number }
                      processNo: { type: string }
      responses:
        '200': { description: 成功 }

  /products/{id}/routes:
    get:
      tags: [E3-Drawing]
      summary: 查询产品工艺路线
      operationId: getProductRoute
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: 成功 }
    post:
      tags: [E3-Drawing]
      summary: 创建/覆盖产品工艺路线
      operationId: createProductRoute
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                changeReason: { type: string }
                processes:
                  type: array
                  items:
                    type: object
                    properties:
                      processSeq: { type: integer }
                      processCode: { type: string }
                      stdTimeMin: { type: number }
                      isOutsource: { type: boolean }
      responses:
        '200': { description: 成功 }

  /products/{id}/routes/copy-from/{srcProductId}:
    post:
      tags: [E3-Drawing]
      summary: 从历史产品复制工艺路线
      operationId: copyProductRoute
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: srcProductId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: 成功 }

  # ============================================================
  # E4 - 扫码仓储
  # ============================================================
  /materials/{id}/barcodes:
    post:
      tags: [E4-Warehouse]
      summary: 生成物料码 WL-
      operationId: generateBarcode
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                batchNo: { type: string }
                qty: { type: number }
      responses:
        '200': { description: 成功 }

  /stock/in:
    post:
      tags: [E4-Warehouse]
      summary: 入库（APP 扫 WL-）
      operationId: stockIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [barcode, type, warehouseId, qty]
              properties:
                barcode: { type: string, example: WL-20260609-0001 }
                type: { type: string, enum: [PURCHASE, PRODUCTION, OUTSOURCE, OTHER] }
                warehouseId: { type: integer }
                locationId: { type: integer }
                qty: { type: number }
      responses:
        '200': { description: 成功 }

  /stock/out:
    post:
      tags: [E4-Warehouse]
      summary: 出库（APP 扫 WL-）
      operationId: stockOut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [barcode, type, warehouseId, qty]
              properties:
                barcode: { type: string }
                type: { type: string, enum: [ISSUE, SHIP, OUTSOURCE, OTHER] }
                warehouseId: { type: integer }
                qty: { type: number }
      responses:
        '200': { description: 成功 }

  /stock:
    get:
      tags: [E4-Warehouse]
      summary: 库存查询（实时 = 在库 + 在途 - 冻结）
      operationId: queryStock
      parameters:
        - name: materialCode
          in: query
          schema: { type: string }
        - name: warehouseId
          in: query
          schema: { type: integer }
        - name: batchNo
          in: query
          schema: { type: string }
      responses:
        '200': { description: 成功 }

  # ============================================================
  # E5 - 生产执行核心
  # ============================================================
  /workorders:
    get:
      tags: [E5-Workorder]
      summary: 工单列表
      operationId: listWorkorders
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200': { description: 成功 }
    post:
      tags: [E5-Workorder]
      summary: 创建工单
      operationId: createWorkorder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Workorder' }
      responses:
        '200': { description: 成功 }

  /workorders/current-process:
    get:
      tags: [E5-Workorder]
      summary: 当前用户进行中的工序（E5-S6 首页）
      operationId: getCurrentProcess
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  workorderId: { type: integer, format: int64 }
                  workorderId: { type: integer, format: int64 }
                  drawingId: { type: integer, format: int64 }
                  workorderNo: { type: string }
                  productName: { type: string }
                  stepNo: { type: integer }
                  processName: { type: string }
                  machineCode: { type: string }
                  machineName: { type: string }
                  status: { type: string, enum: [IN_PROGRESS, WAITING] }

  /workorders/{id}/schedule:
    put:
      tags: [E5-Workorder]
      summary: 排产（Gantt 拖拽）
      operationId: scheduleWorkorder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machineId: { type: integer }
                planStart: { type: string, format: date }
                planEnd: { type: string, format: date }
      responses:
        '200': { description: 成功 }

  /workorders/{id}/mrp:
    post:
      tags: [E5-Workorder]
      summary: MRP 计算
      operationId: mrpCalculate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          shortageList:
                            type: array
                            items:
                              type: object
                              properties:
                                materialCode: { type: string }
                                requiredQty: { type: number }
                                onHandQty: { type: number }
                                shortageQty: { type: number }

  # ---------- 扫码（APP 端） ----------
  /app/workorders/{barcode}/start:
    post:
      tags: [E5-Scan]
      summary: 扫码开工（APP 扫 GD-）
      operationId: scanStart
      parameters:
        - name: barcode
          in: path
          required: true
          schema: { type: string, example: GD-20260609-0001 }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machineBarcode: { type: string, description: '可选 SB-' }
                operatorId: { type: integer }
      responses:
        '200': { description: 成功 }

  /app/workorders/{barcode}/report:
    post:
      tags: [E5-Scan]
      summary: 扫码报工（APP 扫 GD-）
      operationId: scanReport
      parameters:
        - name: barcode
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qtyDone, qtyOk, qtyScrap]
              properties:
                qtyDone: { type: integer, example: 50 }
                qtyOk: { type: integer, example: 48 }
                qtyScrap: { type: integer, example: 2 }
      responses:
        '200': { description: 成功 }

  /app/transfer/{barcode}/next:
    post:
      tags: [E5-Scan]
      summary: 扫码过站（APP 扫 LZ-）
      operationId: scanTransfer
      parameters:
        - name: barcode
          in: path
          required: true
          schema: { type: string, example: LZ-GD001-P01 }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                workorderNo: { type: string, example: GD-20260615-0001 }
                fromStepNo: { type: integer, example: 1 }
                toStepNo: { type: integer, example: 2 }
                toProcessCode: { type: string }
                qty: { type: integer }
      responses:
        '200': { description: 成功 }

  # ---------- V1.3.7 工序分配职责分离 ----------
  /allocations:
    post:
      tags: [E5-Allocation]
      summary: '【生管】分配工序归属（自制/委外）'
      description: |
        **V1.3.7 红线**：此接口只能由生管调用，**不接受 vendorId 字段**。
        勾"委外"的工序会自动推送给采购的"待委外清单"。
      operationId: createAllocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workorderId, processSeq, decision]
              properties:
                workorderId: { type: integer }
                processSeq: { type: integer }
                decision: { type: string, enum: [INHOUSE, OUTSOURCE] }
                qty: { type: integer }
      responses:
        '200': { description: 成功 }
        '40304': { description: 工序分配越权（调用方非生管角色）' }

  /allocations/pending:
    get:
      tags: [E5-Allocation]
      summary: '【采购】取待委外工序清单'
      description: |
        **V1.3.7 红线**：此接口只能由采购调用，**不允许修改 decision 字段**。
        采购只能为每道工序选厂商。
      operationId: pendingAllocations
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/ProcessAllocation'
                            - type: object
                              properties:
                                workorderNo: { type: string }
                                productCode: { type: string }
                                processName: { type: string }

  # ---------- 委外下单（V1.3.7 改版） ----------
  /outsub/orders:
    post:
      tags: [E6-Outsub]
      summary: '【采购】选厂商创建 WW- 单'
      description: |
        **V1.3.7 改版**：采购从此接口创建 WW- 单，自动发 163 邮箱通知厂商。
        **V1.3.7 红线**：此接口**不允许指定 decision / processSeq**，只接受 allocationId + vendorId。
      operationId: createOutsubOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [allocationId, vendorId, unitPrice, deliveryDate, drawingId]
              properties:
                allocationId: { type: integer, description: '来自 /allocations/pending' }
                vendorId: { type: integer }
                unitPrice: { type: number }
                deliveryDate: { type: string, format: date }
                drawingId: { type: integer, description: '加工图纸 ID（Epic 3 · 下单前确认）' }
      responses:
        '200':
          description: 成功（已自动发 163 邮箱）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OutsourceOrder' }

  /outsub/orders/{id}/arrive:
    post:
      tags: [E12-Receive]
      summary: '【仓管】扫 WW- 到货（V1.3.5 新增）'
      description: |
        APP 端"到货扫码"入口；扫委外订单二维码，触发 SHIPPING → PENDING_INSPECTION。
        **V1.3.5 改版**：替代原送货员角色，由仓管代替。
      operationId: arriveOutsub
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OutsourceArriveRequest' }
      responses:
        '200': { description: 成功（自动通知生管 + 品质）' }

  /outsub/orders/{id}/state-transition:
    post:
      tags: [E6-Outsub]
      summary: 状态机转换（V1.3.4 7 状态机）
      operationId: transitionOutsub
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toStatus]
              properties:
                toStatus:
                  type: string
                  enum: [PENDING_SHIP, SHIPPING, PENDING_INSPECTION, INSPECTING, QUALIFIED_STORAGE, STORED, REPAIR_REQUESTED, NOTIFIED_REPAIR]
                reason: { type: string, description: '不良品必填' }
      responses:
        '200': { description: 成功 }
        '40904': { description: 状态机不匹配（守卫拒绝）' }

  /outsub/rework:
    post:
      tags: [E6-Outsub]
      summary: 生成返修单（V1.3.4 返修闭环）
      description: |
        rework_count 自动累加；≥ 阈值（默认 2）自动推高层 + 采购 + 生管。
      operationId: createRework
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [originalOutsourceOrderId, vendorId]
              properties:
                originalOutsourceOrderId: { type: integer }
                vendorId: { type: integer }
                reason: { type: string }
      responses:
        '200': { description: 成功 }

  /outsub/eta/{vendorId}/{processCode}:
    get:
      tags: [E6-Outsub]
      summary: 历史交期预估（V1.3.4）
      description: '返回最近 3 次中位数 + 50%/80%/100% 分位数'
      operationId: getOutsubEta
      parameters:
        - name: vendorId
          in: path
          required: true
          schema: { type: integer }
        - name: processCode
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          medianDays: { type: integer }
                          p50: { type: integer }
                          p80: { type: integer }
                          p100: { type: integer }

  # ---------- 委外 7 状态机（V1.3.7 · Story 1.22 · FR-6-2） ----------
  /outsource-states/advance:
    post:
      tags: [E6-Outsource-State-Machine]
      summary: 委外状态机推进（AC-6.2.1/AC-6.2.2 · 40904 状态守卫）
      description: |
        **V1.3.7 Story 1.22** 委外 7 状态机推进：状态守卫 40904 OUTSOURCE_STATE_INVALID
        生管/采购/品检/财务 分工严格分离（V1.3.7 AD-1）
        终态 CLOSED 不可再开
      operationId: advanceOutsourceState
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OutsourceStateAdvanceRequest' }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OutsourceOrder' }
        '40904': { description: 状态机不匹配（守卫拒绝） }
        '40301': { description: 操作员角色越权（AD-1） }

  /outsource-states/rollback:
    post:
      tags: [E6-Outsource-State-Machine]
      summary: 委外状态机回退（含 REWORK 返修路径）
      description: '回退原因必填，任意非终态 → REWORK'
      operationId: rollbackOutsourceState
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OutsourceStateRollbackRequest' }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OutsourceOrder' }
        '40001': { description: 回退原因缺失 }
        '40904': { description: 终态不可再开 }

  /outsource-states/{outsourceId}/history:
    get:
      tags: [E6-Outsource-State-Machine]
      summary: 委外状态机历史（AC-6.2.3 · 100% 留痕）
      operationId: getOutsourceStateHistory
      parameters:
        - name: outsourceId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/OutsourceStateHistory' }

  /outsource-states/{outsourceId}:
    get:
      tags: [E6-Outsource-State-Machine]
      summary: 获取委外单当前状态
      operationId: getOutsourceCurrentState
      parameters:
        - name: outsourceId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OutsourceOrder' }

  /outsource-states/matrix:
    get:
      tags: [E6-Outsource-State-Machine]
      summary: 7 状态转换矩阵（OpenAPI 元数据）
      description: '7 状态：DRAFT/SUBMITTED/ACCEPTED/IN_PROGRESS/COMPLETED/REWORK + 终态 CLOSED'
      operationId: getOutsourceStateMatrix
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          states:
                            type: array
                            items: { type: string }
                          transitions: { type: object }
                          terminalStates:
                            type: array
                            items: { type: string }
                          operatorRoles: { type: object }

  # ---------- 委外返修闭环（V1.3.7 · Story 1.23 · FR-6-3） ----------
  /reworks:
    post:
      tags: [E6-Rework]
      summary: 创建返修单（AC-6.3.1 · 返修次数 ≤ 3）
      description: |
        **V1.3.7 Story 1.23** 委外返修闭环
        **3 P1 修补**：
        - 返修次数 ≤ 3（40905 REWORK_COUNT_EXCEED_MAX_3）
        - 返修原因必填
        - 返修成本计入月度对账
      operationId: createRework
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReworkCreateRequest' }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Rework' }
        '40001': { description: 返修原因缺失 / 成本非负 }
        '40404': { description: 委外单不存在 }
        '40905': { description: 返修次数超过 3 次 }

  /reworks/{id}/finish:
    post:
      tags: [E6-Rework]
      summary: 完成返修（AC-6.3.2）
      operationId: finishRework
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Rework' }
        '40903': { description: 返修已完成/已取消 }

  /reworks/{outsourceId}/history:
    get:
      tags: [E6-Rework]
      summary: 返修历史（AC-6.3.2 · 完整时间线）
      operationId: getReworkHistory
      parameters:
        - name: outsourceId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ReworkHistory' }

  /reworks/{outsourceId}/alert:
    get:
      tags: [E6-Rework]
      summary: 返修次数预警（4 级别：INFO/WARN/CRITICAL/EXCEED）
      description: |
        **4 级别预警阈值**：
        - 0-1 次 → INFO（首次返修）
        - 2 次 → WARN（接近上限）
        - 3 次 → CRITICAL（已达上限）
        - > 3 次 → EXCEED（超限）
      operationId: getReworkAlert
      parameters:
        - name: outsourceId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          outsourceId: { type: integer }
                          outsourceNo: { type: string }
                          reworkCount: { type: integer }
                          maxAllowed: { type: integer, example: 3 }
                          level: { type: string, enum: [INFO, WARN, CRITICAL, EXCEED] }
                          message: { type: string }
                          history:
                            type: array
                            items: { $ref: '#/components/schemas/ReworkAlert' }

  # ---------- 月度对账（V1.3.6 改版 · 不含"线下"） ----------
  /reconciles:
    post:
      tags: [E6-Reconcile]
      summary: 采购生成对账单 PDF
      description: '**V1.3.6 改版**：不含"采购带纸去厂商处"等线下动作'
      operationId: createReconcile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vendorId, period]
              properties:
                vendorId: { type: integer }
                period: { type: string, example: '2026-05' }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Reconcile' }

  /reconciles/{id}/send-email:
    post:
      tags: [E6-Reconcile]
      summary: 发送对账单邮件（163 邮箱）
      operationId: sendReconcileEmail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功 }
        '50203': { description: 163 SMTP 失败 }
        '50204': { description: 邮件额度耗尽' }

  /reconciles/{id}/upload-signed-scan:
    post:
      tags: [E6-Reconcile]
      summary: 上传厂商签字扫描件（V1.3.6 · AES-256-GCM 加密）
      operationId: uploadSignedScan
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 'PDF / JPG / PNG · ≤ 10MB'
                confirmDate:
                  type: string
                  format: date
                  description: '不能早于对账月最后一天'
      responses:
        '200': { description: 成功（自动 AES-256-GCM 加密）' }

  /reconciles/{id}/confirm:
    post:
      tags: [E6-Reconcile]
      summary: 对账已确认 → 触发付款申请（V1.3.6 三条件）
      description: |
        **触发条件**（缺一不可）：
        1. 对账已确认
        2. 签字扫描件已上传
        3. 双方对账金额一致
      operationId: confirmReconcile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: 成功（生成付款申请）' }
        '40905': { description: 对账金额不一致' }

  # ---------- Story 1.21 月度对账深化（5 端点 · V1.3.7 AD-2 不含"线下"） ----------
  /reconciles/list:
    get:
