      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [E1-Auth]
      summary: 登出
      operationId: logout
      responses:
        '200': { $ref: '#/components/responses/Unauthorized' }

  /users:
    get:
      tags: [E1-Auth]
      summary: 用户列表
      operationId: listUsers
