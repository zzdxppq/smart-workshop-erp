# V1.3.9 Sprint 12 Story 12.4 Schemas

    ZplPrintRequest:
      type: object
      required: [templateCode, qrContent, lines, printerId, count]
      properties:
        templateCode: { type: string, enum: [GD, LZ, SB, WW, WL] }
        qrContent: { type: string, maxLength: 200 }
        lines:
          type: array
          maxItems: 6
          items: { type: string }
        printerId: { type: integer, format: int64 }
        count: { type: integer, minimum: 1, maximum: 100, default: 1 }
        colorBarHex: { type: string, pattern: "^#?[0-9A-Fa-f]{6}$", default: "#1E40AF" }
        remark: { type: string, maxLength: 200 }

    ZplPrintResult:
      type: object
      properties:
        printLogId: { type: integer, format: int64 }
        logNo: { type: string, example: "PR-20260614-001" }
        bytesSent: { type: integer, example: 256 }
        latencyMs: { type: integer, example: 350 }
        protocol: { type: string, enum: [ZPL, TSPL] }

    PdfA4PrintRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 30
          items:
            type: object
            required: [templateCode, qrContent, lines]
            properties:
              templateCode: { type: string, enum: [GD, LZ, SB, WW, WL] }
              qrContent: { type: string, maxLength: 200 }
              lines:
                type: array
                maxItems: 6
                items: { type: string }
              colorBarHex: { type: string, default: "#1E40AF" }
        remark: { type: string, maxLength: 200 }

    PrintLogResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        logNo: { type: string, example: "PR-20260614-001" }
        operatorUserId: { type: integer, format: int64 }
        operatorName: { type: string }
        printedAt: { type: string, format: date-time }
        codeType: { type: string, enum: [GD, LZ, SB, WW, WL, DRAWING] }
        codeValue: { type: string }
        copies: { type: integer }
        printerId: { type: integer, format: int64, nullable: true }
        printerNameSnapshot: { type: string, nullable: true }
        printerIpSnapshot: { type: string, nullable: true }
        printMode: { type: string, enum: [ZPL_DIRECT, PDF_BROWSER] }
        status: { type: string, enum: [SUCCESS, FAILED, PENDING] }
        errorMsg: { type: string, nullable: true }
        referenceLogId: { type: integer, format: int64, nullable: true }
        remark: { type: string, nullable: true }
        tenantId: { type: integer, format: int64 }

    PageResponsePrintLog:
      type: object
      properties:
        records:
          type: array
          items: { $ref: '#/components/schemas/PrintLogResponse' }
        total: { type: integer }
        pageNum: { type: integer }
        pageSize: { type: integer }
        pages: { type: integer }

    ReprintRequest:
      type: object
      properties:
        targetMode:
          type: string
          enum: [ZPL_DIRECT, PDF_BROWSER, SAME]
          default: SAME
        printerId: { type: integer, format: int64, nullable: true }
        remark: { type: string, maxLength: 200 }

    PrintStatisticsBucket:
      type: object
      properties:
        key: { type: string, example: "2026-06" }
        operatorId: { type: integer, format: int64, nullable: true }
        totalCount: { type: integer }
        successCount: { type: integer }
        failedCount: { type: integer }
        totalCopies: { type: integer }
