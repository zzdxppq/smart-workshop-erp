prd:
  prdFile: docs/prd.md
  prdSharded: true                       # PO *shard 后置 true
  prdShardedLocation: docs/prd

architecture:
  architectureFile: docs/architect-handoff.md
  architectureSharded: true               # PO *shard 后置 true
  architectureShardedLocation: docs/architecture
  storyReviewsLocation: docs/architecture/story-reviews

customTechnicalDocuments:
  - path: docs/contract-appendix-a-prd.md
    role: prd_excerpt
  - path: docs/contract-appendix-b-deliverables.md
    role: deliverables
  - path: docs/contract-appendix-c-hardware.md
    role: hardware
  - path: docs/contract-appendix-d-security.md
    role: security
  - path: backend/spec/openapi.yaml
    role: api_contract
  - path: backend/db/init.sql
    role: database_schema
  - path: docs/architecture/er.drawio
    role: er_diagram

devLoadAlwaysFiles:
  - docs/architecture/*coding-standards.md
  - docs/architecture/*tech-stack.md
  - docs/architecture/*source-tree.md

devDebugLog: .ai/debug-log.md
# V1.3.7: multi-repo 规范,Story 跟 backend 仓走(android-impl 仓有专属 app/)
devStoryLocation: backend/docs/stories

verticalSliceStrategy: true

dev:
  devLogLocation: docs/dev/logs
  devLogEnabled: true

architect:
  storyReviewsLocation: docs/architecture/story-reviews

qa:
  qaLocation: docs/qa
  qaReviewsLocation: docs/qa/reviews
  evidenceLocation: docs/qa/evidence
  testDesignThresholds:
    simple:
      maxComplexity: 0
      minQualityScore: 8.5
      securitySensitive: false
      tasks: []
    standard:
      maxComplexity: 2
      minQualityScore: 7
      securitySensitive: false
      tasks:
        - test-design
    comprehensive:
      minComplexity: 3
      securitySensitive: true
      tasks:
        - test-design
        - risk-profile

slashPrefix: Orchestrix
version: 15.17.0

i18n:
  default_language: zh
  supported_languages:
    - en
    - zh
  fallback_to_default: true
  file_pattern: '{name}.{lang}.{ext}'

