epic_id: 2
title: "客户与销售"
description: |
  WHY：销售是工厂的"血液"。业务员每天花 3 小时在客户跟进、报价、订单上，
       但传统 ERP 让他们在 5 个系统间切换。本 Epic 让业务员从询价到回款
       在一个系统内闭环。

stories:
