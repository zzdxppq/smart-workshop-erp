      - "PUT  /api/v1/customers/{id}"
      - "GET  /api/v1/customers?page=0&size=20&keyword=&owner=&protectStatus="
      - "POST /api/v1/customers/{id}/claim"
      - "POST /api/v1/customers/{id}/release"
      - "POST /api/v1/customers/{id}/transfer"
      - "GET  /api/v1/customers/{id}/contacts"
      - "POST /api/v1/customers/{id}/contacts"
      - "GET  /api/v1/customers/{id}/followups"
      - "POST /api/v1/customers/{id}/followups"

  - id: "2.2"
    title: "报价与多级审批"
    estimated_complexity: L  # 8 端点 + 3 AC + 50 测例
    priority: P0
    repository_type: backend
    shard_date: "2026-06-11"
    sharded_by: "PO 范蠡"
    source_story: "backend/docs/stories/1.5-报价与多级审批.md"
    depends_on_stories: ["1.1", "1.2", "1.3", "1.4"]
    acceptance_criteria_count: 3
    sub_tasks_count: 32
    test_level: Comprehensive
    p1_fixes: 3
    p2_fixes: 3
    risk_level: "🟡 Medium (2 M + 3 L)"
    status: "Draft → Awaiting Dev *develop-story"
    acceptance_criteria_summary: |
      - AC-2.2.1: 报价单 CRUD(8 端点) + BJ+年月日+4位流水 + 金额自动计算 + 字段校验
      - AC-2.2.2: 多级审批(< 5万自审 / 5-20万部门经理 / > 20万总经理+财务总监) + 黑名单40902 + OR会签+跳过请假
      - AC-2.2.3: PDF+Excel导出(OpenPDF/POI) + 1h缓存 + 报价转订单(XS+年月日+4位流水)
    provides_apis:
      # CRUD (AC-2.2.1)
      - "POST /api/v1/quotes"                              # 创建报价
      - "GET  /api/v1/quotes/{id}"                         # 查询详情
      - "PUT  /api/v1/quotes/{id}"                         # 修改（仅DRAFT）
      - "GET  /api/v1/quotes?page=0&size=20&status=&customerId=&owner=&dateFrom=&dateTo="  # 列表
      #流程 (AC-2.2.2)
      - "POST /api/v1/quotes/{id}/submit"                  # 提交审批
      - "POST /api/v1/quotes/{id}/approve"                 # 审批通过
      - "POST /api/v1/quotes/{id}/reject"                  # 驳回（含reason）
      #导出+转订单 (AC-2.2.3)
      - "POST /api/v1/quotes/{id}/convert-to-order"       # 转订单
      - "GET  /api/v1/quotes/export/{id}?format=pdf|excel"  # 导出
    consumes_apis:
      - "POST /api/v1/auth/login"             # Story 1.1
      - "GET  /api/v1/auth/me"                # Story 1.1
      - "POST /api/v1/approvals/create"       # Story 1.2 触发审批
      - "GET  /api/v1/thresholds?bizType=QUOTE"  # Story 1.3 金额阈值双轨
      - "GET  /api/v1/dicts?type=CUSTOMER_STATUS"  # Story 1.3 黑名单
      - "stream:notify" Redis Stream           # Story 1.2 4通道推送
    quote_no_template: "BJ{yyyyMMdd}{seq:4}"  # V1.3.7 PRD FR-2-2-1
    order_no_template: "XS{yyyyMMdd}{seq:4}"  # 1.6 订单Story复用
    5_ui_red_lines:
      - "业务自审 < 5万 不显示金额"
      - "> 20万 二次密码确认"
      - "黑名单客户高亮"
      - "转订单预览"
      - "导出审计"

  - id: "2.3"
    title: "订单管理"
    estimated_complexity: L  # 8 端点 + 4 AC + 70 测例
    priority: P0
    repository_type: backend
    shard_date: "2026-06-12"
    sharded_by: "SM 萧何"
    source_story: "backend/docs/stories/1.6-订单管理.md"
    po_signed_by: "PO 范蠡"
    depends_on_stories: ["1.1", "1.2", "1.3", "1.4", "1.5"]
    acceptance_criteria_count: 4
    sub_tasks_count: 36
    test_level: Comprehensive
    p1_fixes: 0
    p2_fixes: 1
    risk_level: "🟡 Medium (3 M + 2 L)"
    status: "Sharded · ready for dev *develop-story"
    acceptance_criteria_summary: |
      - AC-2.3.1: 订单CRUD(8端点) + XS+年月日+4位流水(继承1.5) + 金额自动计算 + 字段校验 + 信用额度校验(40909)
      - AC-2.3.2: 7状态机(DRAFT→CONFIRMED→PRODUCING→PARTIAL_SHIPPED→SHIPPED→SETTLED→CLOSED) + 多级审批(4阈值复用1.5) + OR会签+跳过请假
      - AC-2.3.3: 信用额度校验(V1.3.7 P2修补3的hook) + sys_dict?type=CREDIT_LIMIT + 40909 CREDIT_LIMIT_EXCEEDED + 40902黑名单优先
      - AC-2.3.4: PDF+Excel导出(OpenPDF/POI) + 1h缓存(继承1.5) + 转生产(GD+年月日+4位流水) + 转委外(WW+年月日+4位流水) + 发货+结算+关闭
    provides_apis:
      # CRUD (AC-2.3.1)
      - "POST /api/v1/orders"                              # 创建订单
      - "GET  /api/v1/orders/{id}"                         # 查询详情
      - "PUT  /api/v1/orders/{id}"                         # 修改（仅DRAFT）
      - "GET  /api/v1/orders?page=0&size=20&status=&customerId=&owner=&dateFrom=&dateTo="  # 列表
      # 流程 (AC-2.3.2)
      - "POST /api/v1/orders/{id}/confirm"                 # 确认订单(DRAFT→CONFIRMED)
      - "POST /api/v1/orders/{id}/approve"                 # 审批通过(CONFIRMED→PRODUCING)
      - "POST /api/v1/orders/{id}/reject"                  # 驳回(CONFIRMED→DRAFT, reason)
      # 转下游 + 导出 (AC-2.3.4)
      - "POST /api/v1/orders/{id}/convert-to-production"   # 转生产(GD单号)
      - "POST /api/v1/orders/{id}/convert-to-outsource"    # 转委外(WW单号)
      - "POST /api/v1/orders/{id}/ship"                    # 发货(累计quantity_shipped)
      - "POST /api/v1/orders/{id}/settle"                  # 结算(SHIPPED→SETTLED, 引用Epic9 crm_receipt)
      - "POST /api/v1/orders/{id}/close"                   # 关闭(SETTLED→CLOSED终态)
      - "GET  /api/v1/orders/export/{id}?format=pdf|excel" # 导出PDF/Excel
    consumes_apis:
      - "POST /api/v1/auth/login"             # Story 1.1
      - "GET  /api/v1/auth/me"                # Story 1.1
      - "POST /api/v1/quotes/{id}/convert-to-order"  # Story 1.5 OrderConversionService.convertToOrder(quantityAdjustment hook)
      - "GET  /api/v1/dicts?type=CUSTOMER_STATUS"   # Story 1.3 黑名单校验(40902优先级最高)
      - "GET  /api/v1/dicts?type=CREDIT_LIMIT"      # Story 1.3 信用额度校验(40909)
      - "GET  /api/v1/thresholds?bizType=ORDER"     # Story 1.3 金额阈值双轨(4阈值复用1.5)
      - "POST /api/v1/approvals/create"       # Story 1.2 触发审批
      - "stream:notify" Redis Stream           # Story 1.2 4通道推送
      - "POST /erp-production/api/v1/production-orders"  # Epic 5 转生产(Feign)
      - "POST /erp-production/api/v1/outsource-orders"   # Epic 6 转委外(Feign)
    order_no_template: "XS{yyyyMMdd}{seq:4}"  # 继承Story 1.5 DocNoGenerator
    production_no_template: "GD{yyyyMMdd}{seq:4}"  # V1.3.7 PRD FR-5-1-1 Epic 5
    outsource_no_template: "WW{yyyyMMdd}{seq:4}"   # V1.3.7 PRD FR-6-1-1 Epic 6
    state_machine:  # V1.3.7 §附录-b 状态机速查表
      - "DRAFT → CONFIRMED → PRODUCING → PARTIAL_SHIPPED → SHIPPED → SETTLED → CLOSED"
      - "驳回回退: CONFIRMED → DRAFT(唯一可回退路径)"
      - "PRODUCING之后不可逆"
    credit_limit_validation:  # V1.3.7 P2修补3的hook
      error_code: "40909 CREDIT_LIMIT_EXCEEDED"
      priority: "黑名单40902 > 信用额度40909"
      special_value: "creditLimit=-1 表示无限制"
      audit: "@AuditLog(action=order.credit_check) 留痕4字段"
    5_ui_red_lines:
      - "业务自审 < 5万 不显示金额(继承1.5)"
      - "> 20万 二次密码确认(继承1.5)"
      - "黑名单客户高亮(继承1.5)"
      - "转生产预览(1.6新增)"
      - "转委外预览(1.6新增)"

