epic_id: 1
title: "基础设施与权限"
description: |
  WHY：其他所有 Epic 都依赖"谁能登入、谁能操作、谁能审批"。
           没有这套底座，每个业务模块都要重复造权限轮子，永远统一不起来。
    what_it_is:

stories:
